name: iOS Unsigned IPA

on:
  workflow_dispatch:
    inputs:
      workspace_ref:
        description: "Source ref in FileUni-WorkSpace (tag/branch/sha). Default: main"
        required: false
        default: "main"

permissions:
  contents: read

concurrency:
  group: ios-unsigned-${{ github.run_id }}
  cancel-in-progress: false

env:
  WORKSPACE_REPO: FileUni/FileUni-WorkSpace

jobs:
  build-ios-unsigned:
    runs-on: macos-latest
    steps:
      - name: Resolve workspace ref
        id: resolve-ref
        shell: bash
        run: |
          ref="${{ github.event.inputs.workspace_ref }}"
          echo "ref=${ref:-main}" >> "$GITHUB_OUTPUT"

      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ steps.resolve-ref.outputs.ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          submodules: true
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            workspace/frontends/node_modules
            workspace/frontends/cli/node_modules
            workspace/frontends/gui/node_modules
            workspace/frontends/shared/node_modules
          key: ios-bun-${{ hashFiles('workspace/frontends/bun.lock') }}
          restore-keys: ios-bun-

      - name: Build frontend assets (CLI + GUI)
        working-directory: workspace/frontends
        shell: bash
        run: |
          set -euo pipefail
          # Avoid Node/Vite OOM on macOS arm64 hosted runners.
          export NODE_OPTIONS="--max-old-space-size=8192"
          bun install
          bun run --cwd cli build | tee /tmp/frontend-cli-build.log
          bun run --cwd gui build | tee /tmp/frontend-gui-build.log
          test -f cli/dist/index.html
          test -f gui/dist/index.html

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: workspace
          key: ios-aarch64-apple-ios

      - name: Setup Tauri CLI (Bun)
        shell: bash
        run: |
          set -euo pipefail
          bun add -g @tauri-apps/cli@2
          "${HOME}/.bun/bin/tauri" -V
          mkdir -p "${HOME}/.cargo/bin"
          printf '%s\n' '#!/usr/bin/env bash' 'set -euo pipefail' 'exec "${HOME}/.bun/bin/tauri" "$@"' > "${HOME}/.cargo/bin/cargo-tauri"
          chmod +x "${HOME}/.cargo/bin/cargo-tauri"
          printf '%s\n' '#!/usr/bin/env bash' 'set -euo pipefail' 'exec "${HOME}/.bun/bin/tauri" "$@"' > "${HOME}/.cargo/bin/tauri"
          chmod +x "${HOME}/.cargo/bin/tauri"

          # Ensure `tauri` can be found by Xcode script PATH.
          if [ -d "/usr/local/bin" ]; then
            if [ -w "/usr/local/bin" ]; then
              ln -sf "${HOME}/.cargo/bin/tauri" /usr/local/bin/tauri
            else
              sudo ln -sf "${HOME}/.cargo/bin/tauri" /usr/local/bin/tauri
            fi
          fi

          cargo-tauri -V
          tauri -V

      - name: Initialize iOS project if missing
        working-directory: workspace/apps/gui
        shell: bash
        run: |
          set -euo pipefail
          export PATH="${HOME}/.cargo/bin:${PATH}"
          if [ ! -d "gen/apple" ]; then
            tauri ios init --ci
          fi

      - name: Build iOS unsigned app
        working-directory: workspace/apps/gui
        shell: bash
        run: |
          set -euo pipefail
          export PATH="${HOME}/.cargo/bin:${PATH}"
          export TAURI_CLI_PATH="${HOME}/.cargo/bin/tauri"

          if [ ! -d "gen/apple" ]; then
            tauri ios init --ci
          fi

          echo "PATH=${PATH}"
          command -v tauri
          command -v cargo-tauri

          workspace_path="$(find gen/apple -type d -name '*.xcworkspace' | head -1 || true)"
          project_path="$(find gen/apple -type d -name '*.xcodeproj' | head -1 || true)"

          build_target_args=()
          if [ -n "${workspace_path}" ] && [ -d "${workspace_path}" ]; then
            build_target_args=(-workspace "${workspace_path}")
          elif [ -n "${project_path}" ] && [ -d "${project_path}" ]; then
            build_target_args=(-project "${project_path}")
          else
            echo "::error::No iOS Xcode workspace/project found under gen/apple"
            find gen/apple -maxdepth 3 -type d | sed -n '1,120p'
            exit 1
          fi

          derived_data="$(pwd)/gen/apple/build"
          rm -rf "${derived_data}"

          run_xcodebuild() {
            PATH="${PATH}" TAURI_CLI_PATH="${TAURI_CLI_PATH}" xcodebuild \
              "${build_target_args[@]}" \
              -scheme fileuni-gui_iOS \
              -sdk iphoneos \
              -configuration Release \
              -derivedDataPath "${derived_data}" \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              DEVELOPMENT_TEAM="" \
              build
          }

          set +e
          run_xcodebuild 2>&1 | tee /tmp/xcodebuild-ios.log
          build_status=${PIPESTATUS[0]}
          set -e

          if [ "${build_status}" -ne 0 ] && grep -q 'Script not found "tauri"' /tmp/xcodebuild-ios.log; then
            echo "::warning::Detected missing tauri in Xcode Build Rust script, patching generated script and retrying once"
            script_path="$(grep -oE '/[^ ]*Script-[^ ]+\.sh' /tmp/xcodebuild-ios.log | head -1 || true)"
            if [ -z "${script_path}" ] || [ ! -f "${script_path}" ]; then
              echo "::error::Failed to locate generated Xcode script for patching"
              exit "${build_status}"
            fi

            python3 - "${script_path}" "${HOME}/.cargo/bin/tauri" <<'PY'
            from pathlib import Path
            import re
            import sys

            script_path = Path(sys.argv[1])
            tauri_abs = sys.argv[2]
            content = script_path.read_text()
            patched = re.sub(r'(?<![\w/.-])tauri(?![\w/.-])', tauri_abs, content)
            if patched != content:
                script_path.write_text(patched)
            PY

            set +e
            run_xcodebuild 2>&1 | tee /tmp/xcodebuild-ios-retry.log
            retry_status=${PIPESTATUS[0]}
            set -e

            if [ "${retry_status}" -ne 0 ]; then
              exit "${retry_status}"
            fi
          elif [ "${build_status}" -ne 0 ]; then
            exit "${build_status}"
          fi

      - name: Package unsigned IPA
        shell: bash
        run: |
          set -euo pipefail
          ipa="$(find workspace/apps/gui -type f -name '*.ipa' | head -1 || true)"
          if [ -z "${ipa}" ] || [ ! -f "${ipa}" ]; then
            app="$(find workspace/apps/gui/gen/apple/build -type d -name '*.app' | head -1 || true)"
            if [ -z "${app}" ] || [ ! -d "${app}" ]; then
              app="$(find workspace/apps/gui -type d -name '*.app' | head -1 || true)"
            fi
            if [ -z "${app}" ] || [ ! -d "${app}" ]; then
              echo "::error::No .ipa or .app artifact found"
              exit 1
            fi
            rm -rf /tmp/ios-payload
            mkdir -p /tmp/ios-payload/Payload
            cp -R "${app}" /tmp/ios-payload/Payload/
            (cd /tmp/ios-payload && zip -r -q unsigned.ipa Payload)
            ipa="/tmp/ios-payload/unsigned.ipa"
          fi

          mkdir -p dist
          cp "${ipa}" "dist/FileUni-gui-aarch64-ios-darwin.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: gui-ios-aarch64-apple-ios
          path: dist/*

      - name: Upload build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs
          path: |
            /tmp/frontend-cli-build.log
            /tmp/frontend-gui-build.log
            /tmp/xcodebuild-ios.log
            /tmp/xcodebuild-ios-retry.log
            workspace/apps/gui/gen/apple/build/**/Logs/**
          if-no-files-found: ignore
