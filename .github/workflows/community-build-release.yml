name: Community Build and Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag in FileUni-Community (for example: v1.2.3)"
        required: true
      workspace_ref:
        description: "Source ref in fileuni/FileUni-WorkSpace (tag/branch/sha). Empty = release_tag"
        required: false
        default: ""
      build_mode:
        description: "Build mode override (full/medium/lite/minimal). Empty = vars.BUILD_MODE then minimal"
        required: false
        default: ""
      prerelease:
        description: "Mark this GitHub release as pre-release"
        type: boolean
        required: false
        default: false
      trigger_source:
        description: "Who triggered this release"
        required: false
        default: "manual"

permissions:
  contents: write

concurrency:
  group: fileuni-community-release-${{ inputs.release_tag || github.run_id }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      WORKSPACE_REPO: fileuni/FileUni-WorkSpace
      OUTPUT_DIR: /tmp/FileUniRelease
      DEFAULT_WORKSPACE_REF: main
      CARGO_TOOLS_ROOT: /home/runner/.cargo-tools
    steps:
      - name: Validate required secret
        env:
          FILEUNI_WORKSPACE_PAT: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$FILEUNI_WORKSPACE_PAT" ]; then
            echo "::error::Missing required secret FILEUNI_WORKSPACE_PAT"
            echo "::error::This token must be able to read fileuni/FileUni-WorkSpace"
            exit 1
          fi

      - name: Resolve release inputs
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          release_tag="${{ inputs.release_tag }}"
          workspace_ref="${{ inputs.workspace_ref }}"
          resolved_mode="${{ inputs.build_mode }}"
          trigger_source="${{ inputs.trigger_source }}"

          if [ -z "$release_tag" ]; then
            echo "::error::release_tag must not be empty"
            exit 1
          fi

          if [ -z "$workspace_ref" ]; then
            workspace_ref="$release_tag"
          fi

          if [ -z "$resolved_mode" ]; then
            resolved_mode="${{ vars.BUILD_MODE }}"
          fi

          if [ -z "$resolved_mode" ]; then
            resolved_mode="minimal"
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "workspace_ref=$workspace_ref" >> "$GITHUB_OUTPUT"
          echo "resolved_mode=$resolved_mode" >> "$GITHUB_OUTPUT"
          echo "trigger_source=$trigger_source" >> "$GITHUB_OUTPUT"

      - name: Resolve workspace source ref
        id: source_ref
        env:
          FILEUNI_WORKSPACE_PAT: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
        shell: bash
        run: |
          set -euo pipefail

          ref_candidate="${{ steps.meta.outputs.workspace_ref }}"
          fallback_ref="${{ vars.WORKSPACE_DEFAULT_REF }}"
          if [ -z "$fallback_ref" ]; then
            fallback_ref="$DEFAULT_WORKSPACE_REF"
          fi

          auth_repo_url="https://x-access-token:${FILEUNI_WORKSPACE_PAT}@github.com/${WORKSPACE_REPO}.git"

          has_tag() {
            local ref_name="$1"
            git ls-remote --exit-code --tags "$auth_repo_url" "refs/tags/${ref_name}" > /dev/null 2>&1
          }

          has_branch() {
            local ref_name="$1"
            git ls-remote --exit-code --heads "$auth_repo_url" "refs/heads/${ref_name}" > /dev/null 2>&1
          }

          resolved_ref=""
          if [[ "$ref_candidate" =~ ^[0-9a-fA-F]{7,40}$ ]]; then
            resolved_ref="$ref_candidate"
          elif has_tag "$ref_candidate"; then
            resolved_ref="$ref_candidate"
          elif has_branch "$ref_candidate"; then
            resolved_ref="$ref_candidate"
          elif has_branch "$fallback_ref"; then
            echo "::warning::Source ref '${ref_candidate}' was not found. Falling back to '${fallback_ref}'."
            resolved_ref="$fallback_ref"
          else
            echo "::error::Source ref '${ref_candidate}' and fallback '${fallback_ref}' are both unavailable."
            exit 1
          fi

          echo "resolved_ref=$resolved_ref" >> "$GITHUB_OUTPUT"

      - name: Checkout private workspace source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ steps.source_ref.outputs.resolved_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          fetch-depth: 0
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
          cache-dependency-path: workspace/script/go.sum

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Cache cargo installed tools
        uses: actions/cache@v4
        with:
          path: /home/runner/.cargo-tools
          key: ${{ runner.os }}-cargo-tools-v1-tauri2_10
          restore-keys: |
            ${{ runner.os }}-cargo-tools-v1-

      - name: Add cargo tools to PATH
        shell: bash
        run: |
          set -euo pipefail
          echo "${CARGO_TOOLS_ROOT}/bin" >> "$GITHUB_PATH"

      - name: Cache Cargo registry and git index
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('workspace/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Rust target directory
        uses: actions/cache@v4
        with:
          path: workspace/target
          key: ${{ runner.os }}-cargo-target-${{ steps.meta.outputs.resolved_mode }}-${{ hashFiles('workspace/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-${{ steps.meta.outputs.resolved_mode }}-
            ${{ runner.os }}-cargo-target-

      - name: Cache Bun package downloads
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-cache-${{ hashFiles('workspace/**/bun.lock', 'workspace/**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-cache-

      - name: Prepare build dependencies
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config libssl-dev ruby ruby-dev rpm libarchive-tools \
            squashfs-tools bubblewrap fakeroot \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf
          sudo apt-get install -y upx-ucl || sudo apt-get install -y upx
          sudo gem install --no-document fpm

          if ! command -v cargo-zigbuild > /dev/null 2>&1; then
            cargo install cargo-zigbuild --root "$CARGO_TOOLS_ROOT" --locked
          fi

          if ! command -v cargo-xwin > /dev/null 2>&1; then
            cargo install cargo-xwin --root "$CARGO_TOOLS_ROOT" --locked
          fi

          if ! command -v cargo-tauri > /dev/null 2>&1; then
            cargo install tauri-cli --version '~2.10' --root "$CARGO_TOOLS_ROOT" --locked
          fi

          cargo tauri --version

      - name: Build release artifacts
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail
          rm -rf "$OUTPUT_DIR"
          mkdir -p "$OUTPUT_DIR"

          go run script/tools.go release:build-all "${{ steps.meta.outputs.resolved_mode }}" --output-dir "$OUTPUT_DIR"

          if [ ! -d "$OUTPUT_DIR" ]; then
            echo "::error::Expected artifact directory not found: $OUTPUT_DIR"
            exit 1
          fi

          if ! compgen -G "$OUTPUT_DIR/*" > /dev/null; then
            echo "::error::No artifacts found in: $OUTPUT_DIR"
            exit 1
          fi

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-all-${{ steps.meta.outputs.release_tag }}
          path: /tmp/FileUniRelease/*

      - name: Publish GitHub Release in community repo
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          WORKSPACE_REF: ${{ steps.source_ref.outputs.resolved_ref }}
          BUILD_MODE: ${{ steps.meta.outputs.resolved_mode }}
          TRIGGER_SOURCE: ${{ steps.meta.outputs.trigger_source }}
        shell: bash
        run: |
          set -euo pipefail

          if ! gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            prerelease_flag=""
            if [ "${{ inputs.prerelease }}" = "true" ]; then
              prerelease_flag="--prerelease"
            fi

            notes="Automated release build from ${WORKSPACE_REF} (mode: ${BUILD_MODE}, source: ${TRIGGER_SOURCE})"
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_TAG" \
              --notes "$notes" \
              $prerelease_flag
          fi

          gh release upload "$RELEASE_TAG" \
            "$OUTPUT_DIR"/* \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

      - name: Add workflow summary
        shell: bash
        run: |
          {
            echo "## FileUni Community Release"
            echo "- Release tag: \`${{ steps.meta.outputs.release_tag }}\`"
            echo "- Workspace source ref: \`${{ steps.source_ref.outputs.resolved_ref }}\`"
            echo "- Build mode: \`${{ steps.meta.outputs.resolved_mode }}\`"
            echo "- Trigger source: \`${{ steps.meta.outputs.trigger_source }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
