name: FileUni Release

on:
  workflow_dispatch:
    inputs:
      workspace_ref:
        description: "Source ref in FileUni-WorkSpace (tag/branch/sha). Default: main"
        required: false
        default: "main"
      release_name:
        description: "Release name override. Leave empty to use trigger-mode default naming."
        required: false
      build_mode:
        description: "Build mode: full (all configured platforms) or minimal (CLI musl + GUI x64 AppImage)"
        type: choice
        options:
          - full
          - minimal
        required: false
        default: "full"
      build_target:
        description: "Build target set: cli / gui / cli+gui"
        type: choice
        options:
          - cli+gui
          - cli
          - gui
        required: false
        default: "cli+gui"
      prerelease:
        description: "Mark as pre-release"
        type: boolean
        required: false
        default: true
      enable_upx:
        description: "Create UPX-compressed copies of binaries"
        type: boolean
        required: false
        default: true
      trigger_mode:
        description: "Release trigger mode controlling default release naming"
        type: choice
        options:
          - manual
          - tag
          - nightly
        required: false
        default: "manual"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.run_id }}
  cancel-in-progress: false

env:
  WORKSPACE_REPO: FileUni/FileUni-WorkSpace
  CARGO_DIST_VERSION: "0.28.0"

jobs:
  resolve-matrix:
    runs-on: ubuntu-latest
    outputs:
      workspace_ref: ${{ steps.meta.outputs.workspace_ref }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_timestamp: ${{ steps.meta.outputs.release_timestamp }}
      dist_tag: ${{ steps.meta.outputs.dist_tag }}
      pkg_version: ${{ steps.meta.outputs.pkg_version }}
      publish_version: ${{ steps.meta.outputs.publish_version }}
      build_mode: ${{ steps.matrix.outputs.build_mode }}
      cli_cargo_dist: ${{ steps.matrix.outputs.cli_cargo_dist }}
      cli_cross: ${{ steps.matrix.outputs.cli_cross }}
      cli_android: ${{ steps.matrix.outputs.cli_android }}
      cli_vmactions: ${{ steps.matrix.outputs.cli_vmactions }}
      cli_nfpm: ${{ steps.matrix.outputs.cli_nfpm }}
      gui_tauri: ${{ steps.matrix.outputs.gui_tauri }}
      gui_android: ${{ steps.matrix.outputs.gui_android }}
      gui_ios: ${{ steps.matrix.outputs.gui_ios }}
      has_cli: ${{ steps.matrix.outputs.has_cli }}
      has_gui: ${{ steps.matrix.outputs.has_gui }}
      has_cargo_dist: ${{ steps.matrix.outputs.has_cargo_dist }}
      has_cross: ${{ steps.matrix.outputs.has_cross }}
      has_android: ${{ steps.matrix.outputs.has_android }}
      has_vmactions: ${{ steps.matrix.outputs.has_vmactions }}
      has_nfpm: ${{ steps.matrix.outputs.has_nfpm }}
      has_gui_tauri: ${{ steps.matrix.outputs.has_gui_tauri }}
      has_gui_android: ${{ steps.matrix.outputs.has_gui_android }}
      has_gui_ios: ${{ steps.matrix.outputs.has_gui_ios }}
      has_npm: ${{ steps.matrix.outputs.has_npm }}
    steps:
      - name: Resolve workspace ref
        id: resolve-ref
        run: |
          ref="${{ github.event.inputs.workspace_ref }}"
          echo "ref=${ref:-main}" >> "$GITHUB_OUTPUT"

      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ steps.resolve-ref.outputs.ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          submodules: true
          fetch-depth: 0
          fetch-tags: true

      - name: Checkout community repo
        uses: actions/checkout@v4
        with:
          path: community

      - name: Resolve release metadata
        id: meta
        working-directory: workspace
        run: |
          set -euo pipefail
          ref="${{ steps.resolve-ref.outputs.ref }}"
          trigger_mode="${{ github.event.inputs.trigger_mode }}"
          release_name_input="${{ github.event.inputs.release_name }}"
          prerelease_input="${{ github.event.inputs.prerelease }}"
          default_tag_timestamp="$(TZ=Asia/Shanghai date '+%Y%m%d%H%M%S')"
          echo "workspace_ref=${ref}" >> "$GITHUB_OUTPUT"

          pkg_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "fileuni") | .version')"
          release_timestamp=""
          publish_version="${pkg_version}"
          if [ "${prerelease_input}" = "true" ] || [[ "${pkg_version}" == *-* ]]; then
            release_timestamp="$(TZ=Asia/Shanghai date '+%Y%m%d%H%M%S')"
            publish_version="${pkg_version}.${release_timestamp}"
          fi

          echo "dist_tag=v${pkg_version}" >> "$GITHUB_OUTPUT"
          echo "pkg_version=${pkg_version}" >> "$GITHUB_OUTPUT"
          echo "release_timestamp=${release_timestamp}" >> "$GITHUB_OUTPUT"
          echo "publish_version=${publish_version}" >> "$GITHUB_OUTPUT"

          if [ -n "${release_name_input}" ]; then
            release_tag="${release_name_input}"
          else
            case "${trigger_mode:-manual}" in
              tag)
                case "${ref}" in
                  fileuni-v*) release_tag="FileUni-${ref#fileuni-}" ;;
                  v*) release_tag="FileUni-${ref}" ;;
                  FileUni-*) release_tag="${ref}" ;;
                  *) release_tag="FileUni-${ref}" ;;
                esac
                ;;
              nightly)
                release_tag="nightly_${release_timestamp:-$default_tag_timestamp}"
                ;;
              manual|*)
                release_tag="manually_${release_timestamp:-$default_tag_timestamp}"
                ;;
            esac
          fi

          if [ -n "${release_timestamp}" ] && [[ "${release_tag}" != *"_${release_timestamp}" ]]; then
            release_tag="${release_tag}_${release_timestamp}"
          fi

          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "::notice::dist_tag=v${pkg_version}  pkg_version=${pkg_version}  publish_version=${publish_version}  release_tag=${release_tag}  ref=${ref}  trigger_mode=${trigger_mode:-manual}"

      - name: Resolve build matrix
        id: matrix
        working-directory: community
        run: |
          mode="${{ github.event.inputs.build_mode }}"
          mode="${mode:-full}"
          target_set="${{ github.event.inputs.build_target }}"
          target_set="${target_set:-cli+gui}"

          # Strip JSONC comments and parse
          sed 's|//.*||' .github/build_matrix.jsonc | jq -c '.' > /tmp/matrix.json

          # Filter targets by mode for each build method
          cli_cargo_dist="$(jq -c --arg m "$mode" '[.cli["cargo-dist"][] | select(.mode | index($m))]' /tmp/matrix.json)"
          cli_cross="$(jq -c --arg m "$mode" '[.cli.cross[] | select(.mode | index($m))]' /tmp/matrix.json)"
          cli_android="$(jq -c --arg m "$mode" '[.cli.android[] | select(.mode | index($m))]' /tmp/matrix.json)"
          cli_vmactions="$(jq -c --arg m "$mode" '[.cli.vmactions[] | select(.mode | index($m))]' /tmp/matrix.json)"
          gui_tauri="$(jq -c --arg m "$mode" '[.gui.tauri[] | select(.mode | index($m))]' /tmp/matrix.json)"
          gui_android="$(jq -c --arg m "$mode" '[(.gui.android // [])[] | select(.mode | index($m))]' /tmp/matrix.json)"
          gui_ios="$(jq -c --arg m "$mode" '[(.gui.ios // [])[] | select(.mode | index($m))]' /tmp/matrix.json)"

          if [ "$target_set" = "cli" ]; then
            gui_tauri='[]'
            gui_android='[]'
            gui_ios='[]'
          elif [ "$target_set" = "gui" ]; then
            cli_cargo_dist='[]'
            cli_cross='[]'
            cli_android='[]'
            cli_vmactions='[]'
          fi

          # nFPM targets: all Linux targets with non-empty nfpm_arch from both cargo-dist and cross
          cli_nfpm="$(jq -c '
            [
              (.[] | select(.nfpm_arch != "") | {target, nfpm_arch, artifact: ("cli-" + .target)})
            ]
          ' <(jq -c -n --argjson a "$cli_cargo_dist" --argjson b "$cli_cross" '$a + $b'))"

          has_cli=false
          if [ "$target_set" = "cli" ] || [ "$target_set" = "cli+gui" ]; then
            has_cli=true
          fi

          has_gui=false
          if [ "$target_set" = "gui" ] || [ "$target_set" = "cli+gui" ]; then
            has_gui=true
          fi

          echo "cli_cargo_dist=${cli_cargo_dist}" >> "$GITHUB_OUTPUT"
          echo "cli_cross=${cli_cross}" >> "$GITHUB_OUTPUT"
          echo "cli_android=${cli_android}" >> "$GITHUB_OUTPUT"
          echo "cli_vmactions=${cli_vmactions}" >> "$GITHUB_OUTPUT"
          echo "cli_nfpm=${cli_nfpm}" >> "$GITHUB_OUTPUT"
          echo "gui_tauri=${gui_tauri}" >> "$GITHUB_OUTPUT"
          echo "gui_android=${gui_android}" >> "$GITHUB_OUTPUT"
          if [ "${mode}" = "full" ] && [ "${has_cli}" = "true" ]; then
            has_npm=true
          else
            has_npm=false
          fi

          echo "gui_ios=${gui_ios}" >> "$GITHUB_OUTPUT"
          echo "build_mode=${mode}" >> "$GITHUB_OUTPUT"
          echo "has_cli=${has_cli}" >> "$GITHUB_OUTPUT"
          echo "has_gui=${has_gui}" >> "$GITHUB_OUTPUT"
          echo "has_npm=${has_npm}" >> "$GITHUB_OUTPUT"

          # has_* flags for conditional job execution
          echo "has_cargo_dist=$([ "$(echo "$cli_cargo_dist" | jq 'length')" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_cross=$([ "$(echo "$cli_cross" | jq 'length')" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_android=$([ "$(echo "$cli_android" | jq 'length')" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_vmactions=$([ "$(echo "$cli_vmactions" | jq 'length')" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_nfpm=$([ "$(echo "$cli_nfpm" | jq 'length')" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_gui_tauri=$([ "$(echo "$gui_tauri" | jq 'length')" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_gui_android=$([ "$(echo "$gui_android" | jq 'length')" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_gui_ios=$([ "$(echo "$gui_ios" | jq 'length')" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

          echo "::notice::mode=${mode} target=${target_set} cli_cargo_dist=$(echo "$cli_cargo_dist" | jq 'length') cli_cross=$(echo "$cli_cross" | jq 'length') cli_android=$(echo "$cli_android" | jq 'length') cli_vmactions=$(echo "$cli_vmactions" | jq 'length') cli_nfpm=$(echo "$cli_nfpm" | jq 'length') gui_tauri=$(echo "$gui_tauri" | jq 'length') gui_android=$(echo "$gui_android" | jq 'length') gui_ios=$(echo "$gui_ios" | jq 'length')"

  build-frontend-cli:
    needs: resolve-matrix
    if: needs.resolve-matrix.outputs.has_cli == 'true' || needs.resolve-matrix.outputs.has_gui == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.resolve-matrix.outputs.workspace_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          submodules: true

      - name: Sync favicon
        run: bash workspace/script/fileSync.sh

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            workspace/frontends/node_modules
            workspace/frontends/cli/node_modules
            workspace/frontends/shared/node_modules
          key: bun-${{ hashFiles('workspace/frontends/bun.lock') }}
          restore-keys: bun-

      - name: Build CLI frontend
        working-directory: workspace/frontends
        run: |
          bun install
          bun run --cwd cli build
          test -f cli/dist/index.html

      - name: Upload CLI frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-cli-dist
          path: workspace/frontends/cli/dist

  build-frontend-gui:
    needs: resolve-matrix
    if: needs.resolve-matrix.outputs.has_gui == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.resolve-matrix.outputs.workspace_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          submodules: true

      - name: Sync favicon
        run: bash workspace/script/fileSync.sh

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            workspace/frontends/node_modules
            workspace/frontends/gui/node_modules
            workspace/frontends/shared/node_modules
          key: bun-${{ hashFiles('workspace/frontends/bun.lock') }}
          restore-keys: bun-

      - name: Build GUI frontend
        working-directory: workspace/frontends
        run: |
          bun install
          bun run --cwd gui build
          test -f gui/dist/index.html

      - name: Upload GUI frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-gui-dist
          path: workspace/frontends/gui/dist

  # ============================================================
  # Tier 1/2: cargo-dist native builds
  # ============================================================
  build-cli:
    needs: [resolve-matrix, build-frontend-cli]
    if: needs.resolve-matrix.outputs.has_cargo_dist == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.resolve-matrix.outputs.cli_cargo_dist) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout community repo
        uses: actions/checkout@v4

      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.resolve-matrix.outputs.workspace_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          submodules: true
          fetch-depth: 0
          fetch-tags: true

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-cli-dist
          path: workspace/frontends/cli/dist

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-dist
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-dist@${{ env.CARGO_DIST_VERSION }}

      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Setup Zig (for cross-compilation)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: mlugg/setup-zig@v2
        with:
          version: "0.13.0"

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: workspace
          key: ${{ matrix.target }}

      - name: Build via cargo-dist
        working-directory: workspace
        run: dist build --tag="${{ needs.resolve-matrix.outputs.dist_tag }}" --target "${{ matrix.target }}" --artifacts=local

      - name: Fallback build for i686 Windows
        if: matrix.target == 'i686-pc-windows-msvc'
        shell: bash
        working-directory: workspace
        run: |
          shopt -s nullglob
          files=(target/distrib/*)
          if [ ${#files[@]} -gt 0 ]; then
            exit 0
          fi
          cargo build --release --package fileuni --target "${{ matrix.target }}"

      - name: Package plain binary artifacts
        shell: bash
        run: |
          zip_one() {
            out="$1"
            input="$2"
            if command -v zip >/dev/null 2>&1; then
              zip -j "${out}" "${input}"
              return
            fi
            if command -v python3 >/dev/null 2>&1; then
              python3 -c "import os,sys,zipfile; o,i=sys.argv[1],sys.argv[2]; z=zipfile.ZipFile(o,'w',zipfile.ZIP_DEFLATED); z.write(i, arcname=os.path.basename(i)); z.close()" "${out}" "${input}"
              return
            fi
            python -c "import os,sys,zipfile; o,i=sys.argv[1],sys.argv[2]; z=zipfile.ZipFile(o,'w',zipfile.ZIP_DEFLATED); z.write(i, arcname=os.path.basename(i)); z.close()" "${out}" "${input}"
          }

          target="${{ matrix.target }}"
          if [[ "${target}" == *windows* ]]; then
            bin="workspace/target/${target}/release/fileuni.exe"
            if [ ! -f "${bin}" ]; then
              bin="$(find workspace/target -type f -name 'fileuni.exe' | grep "${target}" | head -1 || true)"
            fi
          else
            bin="workspace/target/${target}/release/fileuni"
            if [ ! -f "${bin}" ]; then
              bin="$(find workspace/target -type f -name 'fileuni' | grep "${target}" | head -1 || true)"
            fi
          fi
          if [ ! -f "${bin}" ]; then
            echo "::error::No binary found for ${target}"
            find workspace/target -maxdepth 6 -type f | sed -n '1,200p'
            exit 1
          fi

          source "${{ github.workspace }}/.github/scripts/arch-helpers.sh"
          base="$(fileuni_cli_base "${target}" default)"

          mkdir -p dist-plain
          if [[ "${target}" == *windows* ]]; then
            zip_one "dist-plain/${base}.exe.zip" "${bin}"
          else
            zip -j "dist-plain/${base}.zip" "${bin}"
          fi

      - name: Create UPX raw binary zip
        if: github.event.inputs.enable_upx != 'false'
        shell: bash
        run: |
          zip_one() {
            out="$1"
            input="$2"
            if command -v zip >/dev/null 2>&1; then
              zip -j "${out}" "${input}"
              return
            fi
            if command -v python3 >/dev/null 2>&1; then
              python3 -c "import os,sys,zipfile; o,i=sys.argv[1],sys.argv[2]; z=zipfile.ZipFile(o,'w',zipfile.ZIP_DEFLATED); z.write(i, arcname=os.path.basename(i)); z.close()" "${out}" "${input}"
              return
            fi
            python -c "import os,sys,zipfile; o,i=sys.argv[1],sys.argv[2]; z=zipfile.ZipFile(o,'w',zipfile.ZIP_DEFLATED); z.write(i, arcname=os.path.basename(i)); z.close()" "${out}" "${input}"
          }

          target="${{ matrix.target }}"
          source "${{ github.workspace }}/.github/scripts/arch-helpers.sh"
          base="$(fileuni_cli_base "${target}" default)"

          if [[ "${target}" == *windows* ]]; then
            bin="workspace/target/${target}/release/fileuni.exe"
            if [ ! -f "${bin}" ]; then
              bin="$(find workspace/target -type f -name 'fileuni.exe' | grep "${target}" | head -1 || true)"
            fi
          else
            bin="workspace/target/${target}/release/fileuni"
            if [ ! -f "${bin}" ]; then
              bin="$(find workspace/target -type f -name 'fileuni' | grep "${target}" | head -1 || true)"
            fi
          fi

          if [ ! -f "${bin}" ]; then
            echo "::error::No binary found for UPX: ${target}"
            exit 1
          fi

          case "${RUNNER_OS}" in
            Linux)
              sudo apt-get update -qq
              sudo apt-get install -y -qq upx-ucl > /dev/null 2>&1
              upx_cmd="upx"
              ;;
            macOS)
              brew install upx
              upx_cmd="upx"
              ;;
            Windows)
              tmpdir="${RUNNER_TEMP:-/tmp}"
              mkdir -p "${tmpdir}/upx"
              downloaded=false
              for url in \
                "https://github.com/upx/upx/releases/download/v5.0.0/upx-5.0.0-win64.zip" \
                "https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-win64.zip"; do
                if curl -fsSL -o "${tmpdir}/upx.zip" "${url}"; then
                  downloaded=true
                  break
                fi
              done
              if [ "${downloaded}" != "true" ]; then
                echo "::error::Failed to download UPX binary"
                exit 1
              fi
              python3 -c "import os,zipfile; t=os.environ.get('RUNNER_TEMP','/tmp'); zipfile.ZipFile(f'{t}/upx.zip').extractall(f'{t}/upx')"
              upx_cmd="$(find "${tmpdir}/upx" -type f -iname 'upx.exe' | head -1)"
              if [ -z "${upx_cmd}" ]; then
                echo "::error::UPX executable not found"
                exit 1
              fi
              ;;
            *)
              echo "::error::Unsupported runner OS: ${RUNNER_OS}"
              exit 1
              ;;
          esac

          ext=""
          if [[ "${bin}" == *.exe ]]; then
            ext=".exe"
          fi
          upx_bin="$(dirname "${bin}")/fileuni-upx${ext}"
          cp "${bin}" "${upx_bin}"
          upx_opts=(--best --lzma)
          if [[ "${target}" == *apple-darwin* ]]; then
            upx_opts+=(--force-macos)
          fi
          "${upx_cmd}" "${upx_opts[@]}" "${upx_bin}"

          mkdir -p dist-upx
          if [[ "${target}" == *windows* ]]; then
            zip_one "dist-upx/${base}.upx.exe.zip" "${upx_bin}"
          else
            zip -j "dist-upx/${base}.upx.zip" "${upx_bin}"
          fi

      - name: Upload UPX artifacts
        if: github.event.inputs.enable_upx != 'false'
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}-upx
          path: dist-upx/*
          if-no-files-found: error

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: dist-plain/*

  # ============================================================
  # Cross-compiled builds (Linux exotic)
  # ============================================================
  build-cli-cross:
    needs: [resolve-matrix, build-frontend-cli]
    if: needs.resolve-matrix.outputs.has_cross == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.resolve-matrix.outputs.cli_cross) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout community repo
        uses: actions/checkout@v4

      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.resolve-matrix.outputs.workspace_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          submodules: true

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-cli-dist
          path: workspace/frontends/cli/dist

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: workspace
          key: cross-${{ matrix.target }}

      - name: Build via cross
        working-directory: workspace
        run: cross build --release --package fileuni --target "${{ matrix.target }}"

      - name: Package binary
        run: |
          target="${{ matrix.target }}"
          source "${{ github.workspace }}/.github/scripts/arch-helpers.sh"
          base="$(fileuni_cli_base "${target}" default)"

          bin="workspace/target/${target}/release/fileuni"
          if [ ! -f "${bin}" ]; then
            bin="workspace/target/${target}/release/fileuni.exe"
          fi
          mkdir -p dist
          if echo "${target}" | grep -q "windows"; then
            zip -j "dist/${base}.exe.zip" "${bin}"
          else
            zip -j "dist/${base}.zip" "${bin}"
          fi

      - name: Create UPX-compressed copy
        if: github.event.inputs.enable_upx != 'false' && !contains(matrix.target, 'riscv64')
        run: |
          target="${{ matrix.target }}"
          source "${{ github.workspace }}/.github/scripts/arch-helpers.sh"
          base="$(fileuni_cli_base "${target}" default)"

          bin="workspace/target/${target}/release/fileuni"
          if [ ! -f "${bin}" ]; then
            echo "::error::Binary not found for UPX: ${bin}"
            exit 1
          fi

          sudo apt-get update -qq && sudo apt-get install -y -qq upx-ucl > /dev/null 2>&1

          cp "${bin}" "${bin}-upx"
          upx --best --lzma "${bin}-upx"

          mkdir -p dist-upx
          zip -j "dist-upx/${base}.upx.zip" "${bin}-upx"
          tar -cJf "dist-upx/${base}.upx.tar.xz" -C "$(dirname "${bin}")" "fileuni-upx"

      - name: Upload UPX artifacts
        if: github.event.inputs.enable_upx != 'false' && !contains(matrix.target, 'riscv64')
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}-upx
          path: dist-upx/*
          if-no-files-found: error

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: dist/*

  # ============================================================
  # Android builds (cargo-ndk)
  # ============================================================
  build-cli-android:
    needs: [resolve-matrix, build-frontend-cli]
    if: needs.resolve-matrix.outputs.has_android == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.resolve-matrix.outputs.cli_android) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout community repo
        uses: actions/checkout@v4

      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.resolve-matrix.outputs.workspace_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          submodules: true

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-cli-dist
          path: workspace/frontends/cli/dist

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Android SDK/NDK
        uses: android-actions/setup-android@v3

      - name: Install Android build-tools (zipalign/apksigner)
        shell: bash
        run: |
          yes | sdkmanager "build-tools;34.0.0" > /dev/null

      - name: Install cargo-ndk
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-ndk

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: workspace
          key: cli-android-${{ matrix.target }}

      - name: Build Android binary
        working-directory: workspace
        run: cargo ndk -t ${{ matrix.ndk_abi }} build --release --package fileuni

      - name: Package binary
        run: |
          target="${{ matrix.target }}"
          source "${{ github.workspace }}/.github/scripts/arch-helpers.sh"
          base="$(fileuni_cli_base "${target}" android)"

          bin="$(find workspace/target -path "*/release/fileuni" | grep "${target}" | head -1 || true)"
          if [ -z "${bin}" ]; then
            echo "::error::Android binary not found for ${target}"
            find workspace/target -maxdepth 5 -type f | sed -n '1,200p'
            exit 1
          fi
          mkdir -p dist
          zip -j "dist/${base}.zip" "${bin}"

      - name: Create UPX-compressed copy
        if: github.event.inputs.enable_upx != 'false'
        run: |
          target="${{ matrix.target }}"
          source "${{ github.workspace }}/.github/scripts/arch-helpers.sh"
          base="$(fileuni_cli_base "${target}" android)"

          bin="$(find workspace/target -path "*/release/fileuni" | grep "${target}" | head -1 || true)"
          if [ -z "${bin}" ] || [ ! -f "${bin}" ]; then
            echo "::error::Android binary not found for UPX: ${target}"
            exit 1
          fi

          sudo apt-get update -qq
          sudo apt-get install -y -qq upx-ucl > /dev/null 2>&1

          upx_bin="$(dirname "${bin}")/fileuni-upx"
          cp "${bin}" "${upx_bin}"
          upx --best --lzma "${upx_bin}"

          mkdir -p dist-upx
          zip -j "dist-upx/${base}.upx.zip" "${upx_bin}"

      - name: Upload UPX artifacts
        if: github.event.inputs.enable_upx != 'false'
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}-upx
          path: dist-upx/*
          if-no-files-found: error

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: dist/*

  # ============================================================
  # GUI builds via Tauri (unsigned)
  # ============================================================
  build-gui:
    needs: [resolve-matrix, build-frontend-cli, build-frontend-gui]
    if: needs.resolve-matrix.outputs.has_gui_tauri == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.resolve-matrix.outputs.gui_tauri) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout community repo
        uses: actions/checkout@v4

      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.resolve-matrix.outputs.workspace_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          submodules: true

      - name: Download GUI frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-gui-dist
          path: workspace/frontends/gui/dist

      - name: Download CLI frontend dist (required by embedded assets)
        uses: actions/download-artifact@v4
        with:
          name: frontend-cli-dist
          path: workspace/frontends/cli/dist

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: workspace
          key: gui-desktop-${{ matrix.target }}

      - name: Install Linux dependencies for Tauri
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            xdg-utils \
            patchelf

      - name: Install cargo-tauri CLI
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli@2

      - name: Build GUI bundles (unsigned)
        working-directory: workspace/apps/gui
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          p = Path('tauri.conf.json')
          cfg = json.loads(p.read_text())
          bundle = cfg.setdefault('bundle', {})
          target = "${{ matrix.target }}"
          if target == 'x86_64-pc-windows-msvc':
            # Windows: build raw .exe only, no msi/nsis bundling
            bundle['active'] = False
          else:
            bundle['active'] = True
          cfg['bundle']['icon'] = ['icons/icon.ico', 'icons/icon.png']
          Path('tauri.ci.conf.json').write_text(json.dumps(cfg))
          PY
          if [[ "${{ matrix.target }}" == *"unknown-linux"* ]]; then
            export CARGO_PROFILE_RELEASE_STRIP=symbols
            export CARGO_PROFILE_RELEASE_DEBUG=0
          fi
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            cargo tauri build --target "${{ matrix.target }}" --config tauri.ci.conf.json
          else
            cargo tauri build --target "${{ matrix.target }}" --bundles "${{ matrix.bundles }}" --config tauri.ci.conf.json
          fi

      - name: Package GUI artifact
        shell: bash
        run: |
          zip_one() {
            out="$1"
            input="$2"
            if command -v zip >/dev/null 2>&1; then
              zip -j "${out}" "${input}"
              return
            fi
            if command -v python3 >/dev/null 2>&1; then
              python3 -c "import os,sys,zipfile; o,i=sys.argv[1],sys.argv[2]; z=zipfile.ZipFile(o,'w',zipfile.ZIP_DEFLATED); z.write(i, arcname=os.path.basename(i)); z.close()" "${out}" "${input}"
              return
            fi
            python -c "import os,sys,zipfile; o,i=sys.argv[1],sys.argv[2]; z=zipfile.ZipFile(o,'w',zipfile.ZIP_DEFLATED); z.write(i, arcname=os.path.basename(i)); z.close()" "${out}" "${input}"
          }

          mkdir -p dist
          target="${{ matrix.target }}"
          source "${{ github.workspace }}/.github/scripts/arch-helpers.sh"
          base="$(fileuni_gui_base "${target}" default)"

          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            file="workspace/target/${{ matrix.target }}/release/fileuni-gui.exe"
            if [ ! -f "${file}" ]; then
              file="$(find workspace/target/${{ matrix.target }}/release -maxdepth 1 -type f -name '*.exe' 2>/dev/null | head -1 || true)"
            fi
            if [ -z "${file}" ] || [ ! -f "${file}" ]; then
              file="$(find workspace/apps/gui/target/${{ matrix.target }}/release -maxdepth 1 -type f -name '*.exe' 2>/dev/null | head -1 || true)"
            fi
          else
            ext="${{ matrix.artifact_ext }}"
            file="$(find workspace/target/${{ matrix.target }}/release/bundle -type f -name "*${ext}" 2>/dev/null | head -1 || true)"
            if [ -z "${file}" ] || [ ! -f "${file}" ]; then
              file="$(find workspace/apps/gui/target/${{ matrix.target }}/release/bundle -type f -name "*${ext}" 2>/dev/null | head -1 || true)"
            fi
          fi
          if [ -z "${file}" ] || [ ! -f "${file}" ]; then
            echo "::error::No GUI artifact found for target ${{ matrix.target }}"
            exit 1
          fi
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            zip_one "dist/${base}.exe.zip" "${file}"
          else
            ext="${file##*.}"
            cp "${file}" "dist/${base}.${ext}"
          fi

      - name: Create GUI Windows UPX-compressed copy
        if: matrix.target == 'x86_64-pc-windows-msvc' && github.event.inputs.enable_upx != 'false'
        shell: bash
        run: |
          zip_one() {
            out="$1"
            input="$2"
            if command -v zip >/dev/null 2>&1; then
              zip -j "${out}" "${input}"
              return
            fi
            if command -v python3 >/dev/null 2>&1; then
              python3 -c "import os,sys,zipfile; o,i=sys.argv[1],sys.argv[2]; z=zipfile.ZipFile(o,'w',zipfile.ZIP_DEFLATED); z.write(i, arcname=os.path.basename(i)); z.close()" "${out}" "${input}"
              return
            fi
            python -c "import os,sys,zipfile; o,i=sys.argv[1],sys.argv[2]; z=zipfile.ZipFile(o,'w',zipfile.ZIP_DEFLATED); z.write(i, arcname=os.path.basename(i)); z.close()" "${out}" "${input}"
          }

          target="${{ matrix.target }}"
          source "${{ github.workspace }}/.github/scripts/arch-helpers.sh"
          base="$(fileuni_gui_base "${target}" windows-msvc)"

          src="workspace/target/${target}/release/fileuni-gui.exe"
          if [ ! -f "${src}" ]; then
            src="$(find workspace/target/${target}/release -maxdepth 1 -type f -name '*.exe' 2>/dev/null | head -1 || true)"
          fi
          if [ -z "${src}" ] || [ ! -f "${src}" ]; then
            src="$(find workspace/apps/gui/target/${target}/release -maxdepth 1 -type f -name '*.exe' 2>/dev/null | head -1 || true)"
          fi
          if [ -z "${src}" ]; then
            echo "::error::No Windows GUI exe found for UPX"
            exit 1
          fi

          downloaded=false
          tmpdir="${RUNNER_TEMP:-/tmp}"
          mkdir -p "${tmpdir}/upx"
          for url in \
            "https://github.com/upx/upx/releases/download/v5.0.0/upx-5.0.0-win64.zip" \
            "https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-win64.zip"; do
            if curl -fsSL -o "${tmpdir}/upx.zip" "${url}"; then
              downloaded=true
              break
            fi
          done
          if [ "${downloaded}" != "true" ]; then
            echo "::error::Failed to download UPX binary"
            exit 1
          fi

          if ! python3 -c "import os,zipfile; t=os.environ.get('RUNNER_TEMP','/tmp'); zipfile.ZipFile(f'{t}/upx.zip').extractall(f'{t}/upx')"; then
            echo "::error::Failed to extract UPX archive"
            exit 1
          fi

          upx_bin="$(find "${tmpdir}/upx" -type f -iname 'upx.exe' | head -1)"
          if [ -z "${upx_bin}" ]; then
            echo "::error::UPX executable not found"
            exit 1
          fi

          mkdir -p dist-upx
          out="dist-upx/${base}.upx.exe"
          cp "${src}" "${out}"
          "$upx_bin" --best --lzma "${out}"
          zip_one "dist-upx/${base}.upx.exe.zip" "${out}"

      - name: Upload GUI Windows UPX artifact
        if: matrix.target == 'x86_64-pc-windows-msvc' && github.event.inputs.enable_upx != 'false'
        uses: actions/upload-artifact@v4
        with:
          name: gui-${{ matrix.target }}-upx
          path: dist-upx/*.zip
          if-no-files-found: error

      - name: Upload GUI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gui-${{ matrix.target }}
          path: dist/*

  build-gui-android:
    needs: [resolve-matrix, build-frontend-cli, build-frontend-gui]
    if: needs.resolve-matrix.outputs.has_gui_android == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.resolve-matrix.outputs.gui_android) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout community repo
        uses: actions/checkout@v4

      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.resolve-matrix.outputs.workspace_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          submodules: true

      - name: Download GUI frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-gui-dist
          path: workspace/frontends/gui/dist

      - name: Download CLI frontend dist (required by embedded assets)
        uses: actions/download-artifact@v4
        with:
          name: frontend-cli-dist
          path: workspace/frontends/cli/dist

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK/NDK
        uses: android-actions/setup-android@v3

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: workspace
          key: gui-android-${{ matrix.target }}

      - name: Install cargo-tauri CLI
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli@2

      - name: Initialize Android project if missing
        working-directory: workspace/apps/gui
        shell: bash
        run: |
          if [ ! -d "gen/android" ]; then
            cargo tauri android init --ci
          fi

      - name: Build Android APK
        working-directory: workspace/apps/gui
        shell: bash
        run: |
          apk_opt=()
          tauri_target="${{ matrix.target }}"
          case "${{ matrix.target }}" in
            aarch64-linux-android) tauri_target="aarch64" ;;
            armv7-linux-androideabi) tauri_target="armv7" ;;
            x86_64-linux-android) tauri_target="x86_64" ;;
          esac
          if cargo tauri android build --help | grep -q -- '--apk'; then
            apk_opt+=(--apk)
          fi
          cargo tauri android build --ci --target "${tauri_target}" --config tauri.android.conf.json "${apk_opt[@]}"

      - name: Zipalign + apksigner (debug/release)
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [ -z "${sdk_root}" ]; then
            echo "::error::ANDROID_SDK_ROOT/ANDROID_HOME not set"
            exit 1
          fi

          build_tools="$(ls -d "${sdk_root}/build-tools/"* 2>/dev/null | sort -V | tail -1 || true)"
          if [ -z "${build_tools}" ]; then
            echo "::error::Android build-tools not found under ${sdk_root}"
            exit 1
          fi
          zipalign="${build_tools}/zipalign"
          apksigner="${build_tools}/apksigner"
          if [ ! -x "${zipalign}" ] || [ ! -x "${apksigner}" ]; then
            echo "::error::zipalign/apksigner not executable in ${build_tools}"
            exit 1
          fi

          apk="$(find workspace/apps/gui -type f -name '*.apk' | grep -E '(release|unsigned)' | head -1 || true)"
          if [ -z "${apk}" ] || [ ! -f "${apk}" ]; then
            apk="$(find workspace/apps/gui -type f -name '*.apk' | head -1 || true)"
          fi
          if [ -z "${apk}" ] || [ ! -f "${apk}" ]; then
            echo "::error::No APK artifact found for signing"
            exit 1
          fi

          key_b64="${ANDROID_KEYSTORE_BASE64:-${ANDROID_KEY_BASE64:-}}"
          if [ -n "${key_b64}" ]; then
            keystore="${RUNNER_TEMP}/android-release.keystore"
            printf '%s' "${key_b64}" | base64 -d > "${keystore}"
            key_alias="${ANDROID_KEY_ALIAS}"
            store_pass="${ANDROID_STORE_PASSWORD:-${ANDROID_KEY_PASSWORD}}"
            key_pass="${ANDROID_KEY_PASSWORD:-${ANDROID_STORE_PASSWORD}}"
          else
            keystore="${RUNNER_TEMP}/android-debug.keystore"
            key_alias="androiddebugkey"
            store_pass="android"
            key_pass="android"
            keytool -genkeypair -v \
              -keystore "${keystore}" \
              -storepass "${store_pass}" \
              -keypass "${key_pass}" \
              -alias "${key_alias}" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

          if [ -z "${key_alias}" ] || [ -z "${store_pass}" ] || [ -z "${key_pass}" ]; then
            echo "::error::Signing credentials missing"
            exit 1
          fi

          aligned="${RUNNER_TEMP}/fileuni-aligned.apk"
          signed="${RUNNER_TEMP}/fileuni-signed.apk"
          "${zipalign}" -f -p 4 "${apk}" "${aligned}"
          "${apksigner}" sign \
            --ks "${keystore}" \
            --ks-key-alias "${key_alias}" \
            --ks-pass "pass:${store_pass}" \
            --key-pass "pass:${key_pass}" \
            --out "${signed}" \
            "${aligned}"
          "${apksigner}" verify --verbose "${signed}"
          echo "SIGNED_APK=${signed}" >> "$GITHUB_ENV"

      - name: Package Android artifact
        shell: bash
        run: |
          target="${{ matrix.target }}"
          source "${{ github.workspace }}/.github/scripts/arch-helpers.sh"
          base="$(fileuni_gui_base "${target}" android)"

          apk="${SIGNED_APK:-}"
          if [ -z "${apk}" ] || [ ! -f "${apk}" ]; then
            apk="$(find workspace/apps/gui -type f -name '*.apk' | grep -E '(release|unsigned)' | head -1 || true)"
          fi
          if [ -z "${apk}" ] || [ ! -f "${apk}" ]; then
            apk="$(find workspace/apps/gui -type f -name '*.apk' | head -1 || true)"
          fi
          if [ -z "${apk}" ] || [ ! -f "${apk}" ]; then
            echo "::error::No APK artifact found for target ${target}"
            exit 1
          fi

          mkdir -p dist
          cp "${apk}" "dist/${base}.apk"

      - name: Upload GUI Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gui-android-${{ matrix.target }}
          path: dist/*

  build-gui-ios:
    needs: [resolve-matrix, build-frontend-cli, build-frontend-gui]
    if: needs.resolve-matrix.outputs.has_gui_ios == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.resolve-matrix.outputs.gui_ios) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout community repo
        uses: actions/checkout@v4

      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.resolve-matrix.outputs.workspace_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          submodules: true

      - name: Download GUI frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-gui-dist
          path: workspace/frontends/gui/dist

      - name: Download CLI frontend dist (required by embedded assets)
        uses: actions/download-artifact@v4
        with:
          name: frontend-cli-dist
          path: workspace/frontends/cli/dist

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: workspace
          key: gui-ios-${{ matrix.target }}

      - name: Install cargo-tauri CLI
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli@2

      - name: Recreate iOS project (deterministic)
        working-directory: workspace/apps/gui
        shell: bash
        run: |
          set -euo pipefail
          cargo tauri -V
          rm -rf gen/apple
          cargo tauri ios init --ci

      - name: Ensure Xcode Tauri bridge script exists
        working-directory: workspace/apps/gui
        shell: bash
        run: |
          set -euo pipefail
          bridge="gen/apple/tauri"
          if [ ! -f "${bridge}" ]; then
            printf '%s\n' '#!/usr/bin/env bash' 'set -euo pipefail' 'exec cargo tauri "$@"' > "${bridge}"
            chmod +x "${bridge}"
          fi

      - name: Build iOS IPA (unsigned)
        working-directory: workspace/apps/gui
        shell: bash
        run: |
          set -euo pipefail
          xcode_dev_dir="$(xcode-select -p)"
          default_toolchain="${xcode_dev_dir}/Toolchains/XcodeDefault.xctoolchain"
          ci_xcconfig="/tmp/fileuni-ios-ci.xcconfig"
          swift_lib_paths="${default_toolchain}/usr/lib/swift/iphoneos ${default_toolchain}/usr/lib/swift-5.0/iphoneos"
          swift_ldflags="-L${default_toolchain}/usr/lib/swift/iphoneos -L${default_toolchain}/usr/lib/swift-5.0/iphoneos"
          cat > "${ci_xcconfig}" <<'XCCONFIG'
          TOOLCHAINS = com.apple.dt.toolchain.XcodeDefault
          XCCONFIG

          # Force generated Xcode project to unsigned mode.
          project_pbxproj="gen/apple/fileuni-gui.xcodeproj/project.pbxproj"
          if [ -f "${project_pbxproj}" ]; then
            escaped_toolchain="$(printf '%s\n' "${default_toolchain}" | sed 's/[\\/&]/\\&/g')"
            perl -0777 -i -pe 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = "";/g; s/CODE_SIGN_STYLE = [^;]*;/CODE_SIGN_STYLE = Manual;/g; s/CODE_SIGN_IDENTITY = [^;]*;/CODE_SIGN_IDENTITY = "";/g; s/PROVISIONING_PROFILE_SPECIFIER = [^;]*;/PROVISIONING_PROFILE_SPECIFIER = "";/g; s/PROVISIONING_PROFILE = [^;]*;/PROVISIONING_PROFILE = "";/g;' "${project_pbxproj}"
            perl -0777 -i -pe "s/\\$\\(TOOLCHAIN_DIR\\)\\/usr\\/lib\\/swift\\//${escaped_toolchain}\\/usr\\/lib\\/swift\\//g; s/\\$\\(TOOLCHAIN_DIR\\)\\/usr\\/lib\\/swift-5\\.0\\//${escaped_toolchain}\\/usr\\/lib\\/swift-5.0\\//g;" "${project_pbxproj}"
          fi

          tauri_target="${{ matrix.target }}"
          case "${{ matrix.target }}" in
            aarch64-apple-ios) tauri_target="aarch64" ;;
          esac

          set +e
          if cargo tauri ios build --help | grep -q -- '--no-sign'; then
            APPLE_CERTIFICATE="" \
            APPLE_CERTIFICATE_PASSWORD="" \
            APPLE_SIGNING_IDENTITY="" \
            APPLE_TEAM_ID="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            PROVISIONING_PROFILE="" \
            XCODE_XCCONFIG_FILE="${ci_xcconfig}" \
            LIBRARY_SEARCH_PATHS="${swift_lib_paths}" \
            OTHER_LDFLAGS="${swift_ldflags}" \
            TOOLCHAINS="com.apple.dt.toolchain.XcodeDefault" \
            TOOLCHAIN_DIR="${default_toolchain}" \
            cargo tauri ios build --ci --target "${tauri_target}" --config tauri.ios.conf.json --no-sign | tee /tmp/xcodebuild-ios.log
          else
            APPLE_CERTIFICATE="" \
            APPLE_CERTIFICATE_PASSWORD="" \
            APPLE_SIGNING_IDENTITY="" \
            APPLE_TEAM_ID="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            PROVISIONING_PROFILE="" \
            XCODE_XCCONFIG_FILE="${ci_xcconfig}" \
            LIBRARY_SEARCH_PATHS="${swift_lib_paths}" \
            OTHER_LDFLAGS="${swift_ldflags}" \
            TOOLCHAINS="com.apple.dt.toolchain.XcodeDefault" \
            TOOLCHAIN_DIR="${default_toolchain}" \
            cargo tauri ios build --ci --target "${tauri_target}" --config tauri.ios.conf.json | tee /tmp/xcodebuild-ios.log
          fi
          build_exit="${PIPESTATUS[0]}"
          set -e

          if [ "${build_exit}" -ne 0 ]; then
            if grep -Eq 'exportArchive No Team Found in Archive|failed to export iOS app|EXPORT FAILED' /tmp/xcodebuild-ios.log; then
              echo "::warning::Ignoring export failure for unsigned build; packaging .app manually."
            else
              exit "${build_exit}"
            fi
          fi

      - name: Package iOS artifact
        shell: bash
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          source "${{ github.workspace }}/.github/scripts/arch-helpers.sh"
          base="$(fileuni_gui_base "${target}" ios-app)"

          ipa="$(find workspace/apps/gui -type f -name '*.ipa' | head -1 || true)"
          if [ -z "${ipa}" ] || [ ! -f "${ipa}" ]; then
            app="$(find workspace/apps/gui/gen/apple/build/Build/Products -type d -name '*.app' | head -1 || true)"
            if [ -z "${app}" ] || [ ! -d "${app}" ]; then
              app="$(find workspace/apps/gui/gen/apple/build -type d -name '*.app' | head -1 || true)"
            fi
            if [ -z "${app}" ] || [ ! -d "${app}" ]; then
              app="$(find workspace/apps/gui -type d -name '*.app' | head -1 || true)"
            fi
            if [ -z "${app}" ] || [ ! -d "${app}" ]; then
              echo "::error::No .ipa or .app artifact found for target ${{ matrix.target }}"
              exit 1
            fi
            rm -rf /tmp/ios-payload
            mkdir -p /tmp/ios-payload/Payload
            cp -R "${app}" /tmp/ios-payload/Payload/
            (cd /tmp/ios-payload && zip -r -q unsigned.ipa Payload)
            ipa="/tmp/ios-payload/unsigned.ipa"
          fi

          mkdir -p dist
          cp "${ipa}" "dist/${base}.ipa"

      - name: Upload GUI iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gui-ios-${{ matrix.target }}
          path: dist/*

      - name: Upload iOS build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs-${{ matrix.target }}
          path: |
            /tmp/xcodebuild-ios.log
            workspace/apps/gui/gen/apple/build/**/Logs/**
          if-no-files-found: ignore

  # ============================================================
  # BSD builds via vmactions (FreeBSD native VM)
  # ============================================================
  build-cli-bsd:
    needs: [resolve-matrix, build-frontend-cli]
    if: needs.resolve-matrix.outputs.has_vmactions == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.resolve-matrix.outputs.cli_vmactions) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout community repo
        uses: actions/checkout@v4

      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.resolve-matrix.outputs.workspace_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          submodules: true

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-cli-dist
          path: workspace/frontends/cli/dist

      - name: Build on FreeBSD
        if: matrix.os == 'freebsd'
        uses: vmactions/freebsd-vm@v1
        with:
          release: ${{ matrix.release }}
          usesh: true
          copyback: true
          mem: 8192
          prepare: |
            pkg install -y rust curl zip
          run: |
            cd workspace
            cargo build --release --package fileuni
            ls -la target/release/fileuni

      - name: Package binary
        run: |
          target="${{ matrix.target }}"
          source "${{ github.workspace }}/.github/scripts/arch-helpers.sh"
          base="$(fileuni_cli_base "${target}" freebsd)"

          bin="workspace/target/release/fileuni"
          if [ ! -f "${bin}" ]; then
            echo "::error::Binary not found at ${bin}"
            exit 1
          fi
          mkdir -p dist
          zip -j "dist/${base}.zip" "${bin}"
          tar -cJf "dist/${base}.tar.xz" -C "$(dirname "${bin}")" "$(basename "${bin}")"

      - name: Package UPX binary
        if: github.event.inputs.enable_upx != 'false' && !contains(matrix.target, 'freebsd')
        run: |
          target="${{ matrix.target }}"
          source "${{ github.workspace }}/.github/scripts/arch-helpers.sh"
          base="$(fileuni_cli_base "${target}" freebsd)"

          upx_bin="workspace/target/release/fileuni-upx"
          if [ ! -f "${upx_bin}" ]; then
            echo "::error::FreeBSD UPX binary not found at ${upx_bin}"
            exit 1
          fi
          mkdir -p dist-upx
          zip -j "dist-upx/${base}.upx.zip" "${upx_bin}"

      - name: Upload UPX artifacts
        if: github.event.inputs.enable_upx != 'false' && !contains(matrix.target, 'freebsd')
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}-upx
          path: dist-upx/*
          if-no-files-found: error

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: dist/*

  # ============================================================
  # Linux packaging via nFPM (deb/rpm/apk/archlinux/ipk)
  # ============================================================
  package-linux:
    needs: [resolve-matrix, build-cli, build-cli-cross]
    if: ${{
      !cancelled() &&
      needs.resolve-matrix.outputs.has_nfpm == 'true' &&
      (needs.resolve-matrix.outputs.has_cargo_dist != 'true' || needs.build-cli.result == 'success') &&
      (needs.resolve-matrix.outputs.has_cross != 'true' || needs.build-cli-cross.result == 'success')
      }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.resolve-matrix.outputs.cli_nfpm) }}
    steps:
      - name: Checkout community repo
        uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifact

      - name: Extract binary
        run: |
          mkdir -p binary
          file_zip="$(find artifact -type f -name '*.zip' | head -1 || true)"
          file_tar="$(find artifact -type f -name '*.tar.xz' | head -1 || true)"
          if [ -n "${file_zip}" ]; then
            unzip -q "${file_zip}" -d binary
          elif [ -n "${file_tar}" ]; then
            tar -xJf "${file_tar}" -C binary
          else
            direct_bin="$(find artifact -type f -name fileuni | head -1)"
            if [ -n "${direct_bin}" ]; then
              cp "${direct_bin}" binary/fileuni
            fi
          fi

          real_bin="$(find binary -type f -name fileuni | head -1)"
          if [ -z "${real_bin}" ]; then
            echo "::error::Extracted package does not contain fileuni binary"
            find binary -maxdepth 5 -type f | sed -n '1,200p'
            exit 1
          fi
          if [ "${real_bin}" != "binary/fileuni" ]; then
            cp "${real_bin}" binary/fileuni
          fi
          chmod +x binary/fileuni
          ls -la binary/

      - name: Install nFPM
        uses: secondlife/setup-nfpm@v3
        with:
          version: 2.45.0

      - name: Create nfpm config
        env:
          NFPM_ARCH: ${{ matrix.nfpm_arch }}
          VERSION: ${{ needs.resolve-matrix.outputs.publish_version }}
        run: |
          cat > nfpm.yaml <<NFPM
          name: fileuni
          arch: ${NFPM_ARCH}
          version: ${VERSION}
          maintainer: FileUni Team <contact@fileuni.com>
          description: FileUni - Modular file platform
          homepage: https://github.com/FileUni
          license: MIT
          contents:
            - src: ./binary/fileuni
              dst: /usr/bin/fileuni
              file_info:
                mode: 0755
          NFPM

      - name: Build packages
        env:
          NFPM_ARCH: ${{ matrix.nfpm_arch }}
          VERSION: ${{ needs.resolve-matrix.outputs.publish_version }}
        run: |
          mkdir -p packages
          target="${{ matrix.target }}"

          source "${{ github.workspace }}/.github/scripts/arch-helpers.sh"
          base="$(fileuni_cli_base "${target}" linux-packages)"

          for fmt in deb rpm apk archlinux ipk; do
            nfpm package --packager "${fmt}" --config nfpm.yaml --target "packages/" 2>&1 || echo "::warning::${fmt} packaging failed for ${target}"
          done

          shopt -s nullglob
          for p in packages/*; do
            name="$(basename "${p}")"
            if [[ "${name}" == *.pkg.tar.zst ]]; then
              ext="pkg.tar.zst"
            else
              ext="${name##*.}"
            fi
            mv "${p}" "packages/${base}.${ext}"
          done

          ls -la packages/

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.target }}
          path: packages/*

  publish-docker:
    needs: [resolve-matrix, build-cli, build-cli-cross]
    if: ${{
      !cancelled() &&
      needs.resolve-matrix.outputs.build_mode == 'full' &&
      needs.resolve-matrix.outputs.has_cli == 'true' &&
      (needs.resolve-matrix.outputs.has_cargo_dist != 'true' || needs.build-cli.result == 'success') &&
      (needs.resolve-matrix.outputs.has_cross != 'true' || needs.build-cli-cross.result == 'success')
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout community repo
        uses: actions/checkout@v4

      - name: Download Linux musl CLI artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/docker-artifacts

      - name: Prepare container binaries
        shell: bash
        run: |
          set -euo pipefail
          chmod +x .github/scripts/prepare-container-binaries.sh
          .github/scripts/prepare-container-binaries.sh /tmp/docker-artifacts /tmp/docker-context/binaries plain
          find /tmp/docker-context -maxdepth 3 -type f | sort
          if [ "${{ github.event.inputs.enable_upx }}" != "false" ]; then
            .github/scripts/prepare-container-binaries.sh /tmp/docker-artifacts /tmp/docker-context-upx/binaries upx
            find /tmp/docker-context-upx -maxdepth 3 -type f | sort
          fi

      - name: Resolve Docker tags
        id: docker-tags
        shell: bash
        env:
          PKG_VERSION: ${{ needs.resolve-matrix.outputs.publish_version }}
          RELEASE_TAG: ${{ needs.resolve-matrix.outputs.release_tag }}
          PRERELEASE: ${{ github.event.inputs.prerelease }}
        run: |
          set -euo pipefail
          sanitize_tag() {
            printf '%s' "$1" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9_.-]/-/g'
          }

          is_stable_tag() {
            case "$1" in
              *alpha*|*beta*|*rc*|*test*|*demo*|*temp*|*tmp*|*manually*)
                return 1
                ;;
              *)
                return 0
                ;;
            esac
          }

          version_tag="$(sanitize_tag "${PKG_VERSION}")"
          release_tag="$(sanitize_tag "${RELEASE_TAG}")"

          alpine_tags=$'fileuni/fileuni:'"${version_tag}"$'-alpine\nfileuni/fileuni:'"${release_tag}"$'-alpine'
          alpine_upx_tags=$'fileuni/fileuni:'"${version_tag}"$'-alpine-upx\nfileuni/fileuni:'"${release_tag}"$'-alpine-upx'
          debian_tags=$'fileuni/fileuni:'"${version_tag}"$'-debian\nfileuni/fileuni:'"${release_tag}"$'-debian'

          if [ "${PRERELEASE}" != "true" ] && is_stable_tag "${version_tag}" && is_stable_tag "${release_tag}"; then
            alpine_tags+=$'\nfileuni/fileuni:alpine'
            alpine_upx_tags+=$'\nfileuni/fileuni:alpine-upx'
            debian_tags+=$'\nfileuni/fileuni:debian'
          fi

          {
            echo "alpine<<EOF"
            printf '%s\n' "${alpine_tags}"
            echo "EOF"
            echo "alpine_upx<<EOF"
            printf '%s\n' "${alpine_upx_tags}"
            echo "EOF"
            echo "debian<<EOF"
            printf '%s\n' "${debian_tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: fileuni
          password: ${{ secrets.DOCKER_KEY != '' && secrets.DOCKER_KEY || vars.DOCKER_KEY }}

      - name: Build and push Alpine image
        uses: docker/build-push-action@v6
        with:
          context: /tmp/docker-context
          file: .github/docker/alpine.Dockerfile
          platforms: linux/amd64,linux/386,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.docker-tags.outputs.alpine }}

      - name: Build and push Alpine UPX image
        if: github.event.inputs.enable_upx != 'false'
        uses: docker/build-push-action@v6
        with:
          context: /tmp/docker-context-upx
          file: .github/docker/alpine.Dockerfile
          platforms: linux/amd64,linux/386,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.docker-tags.outputs.alpine_upx }}

      - name: Build and push Debian deps image
        uses: docker/build-push-action@v6
        with:
          context: /tmp/docker-context
          file: .github/docker/debian-deps.Dockerfile
          platforms: linux/amd64,linux/386,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.docker-tags.outputs.debian }}

  update-package-indexes:
    needs: [resolve-matrix, publish]
    if: ${{
      !cancelled() &&
      needs.resolve-matrix.outputs.build_mode == 'full' &&
      needs.resolve-matrix.outputs.has_cli == 'true' &&
      github.event.inputs.trigger_mode == 'tag' &&
      needs.publish.result == 'success'
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout community repo
        uses: actions/checkout@v4

      - name: Download macOS x64 CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: cli-x86_64-apple-darwin
          path: /tmp/package-index-artifacts/x86_64-apple-darwin

      - name: Download macOS arm64 CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: cli-aarch64-apple-darwin
          path: /tmp/package-index-artifacts/aarch64-apple-darwin

      - name: Download Linux x64 GNU CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: cli-x86_64-unknown-linux-gnu
          path: /tmp/package-index-artifacts/x86_64-unknown-linux-gnu

      - name: Download Linux arm64 GNU CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: cli-aarch64-unknown-linux-gnu
          path: /tmp/package-index-artifacts/aarch64-unknown-linux-gnu

      - name: Download Windows x64 CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: cli-x86_64-pc-windows-msvc
          path: /tmp/package-index-artifacts/x86_64-pc-windows-msvc

      - name: Download Windows x86 CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: cli-i686-pc-windows-msvc
          path: /tmp/package-index-artifacts/i686-pc-windows-msvc

      - name: Clone package repositories
        shell: bash
        env:
          FILEUNI_WORKSPACE_PAT: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
        run: |
          set -euo pipefail
          base_url="https://x-access-token:${FILEUNI_WORKSPACE_PAT}@github.com/FileUni"
          git clone --depth 1 "${base_url}/homebrew-fileuni.git" /tmp/package-repos/homebrew-fileuni
          git clone --depth 1 "${base_url}/scoop-fileuni.git" /tmp/package-repos/scoop-fileuni
          git clone --depth 1 "${base_url}/nixpkgs-fileuni.git" /tmp/package-repos/nixpkgs-fileuni

      - name: Configure git identity
        shell: bash
        run: |
          set -euo pipefail
          for repo_dir in \
            /tmp/package-repos/homebrew-fileuni \
            /tmp/package-repos/scoop-fileuni \
            /tmp/package-repos/nixpkgs-fileuni
          do
            git -C "${repo_dir}" config user.name "github-actions[bot]"
            git -C "${repo_dir}" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          done

      - name: Generate package repositories
        shell: bash
        env:
          PKG_VERSION: ${{ needs.resolve-matrix.outputs.publish_version }}
          RELEASE_TAG: ${{ needs.resolve-matrix.outputs.release_tag }}
        run: |
          set -euo pipefail
          python3 .github/scripts/update_package_indexes.py \
            --artifact-root /tmp/package-index-artifacts \
            --template-root .github/package-repos \
            --homebrew-out /tmp/package-repos/homebrew-fileuni \
            --scoop-out /tmp/package-repos/scoop-fileuni \
            --nix-out /tmp/package-repos/nixpkgs-fileuni \
            --version "${PKG_VERSION}" \
            --release-tag "${RELEASE_TAG}"

      - name: Push package repository updates
        shell: bash
        run: |
          set -euo pipefail

          commit_and_push() {
            local repo_dir="$1"
            local message="$2"

            if [ -z "$(git -C "${repo_dir}" status --porcelain)" ]; then
              echo "No changes for ${repo_dir}"
              return 0
            fi

            git -C "${repo_dir}" add .
            git -C "${repo_dir}" commit -m "${message}"
            git -C "${repo_dir}" push origin HEAD:main
          }

          commit_and_push /tmp/package-repos/homebrew-fileuni "chore(release): update formula for ${{ needs.resolve-matrix.outputs.publish_version }}"
          commit_and_push /tmp/package-repos/scoop-fileuni "chore(release): update manifest for ${{ needs.resolve-matrix.outputs.publish_version }}"
          commit_and_push /tmp/package-repos/nixpkgs-fileuni "chore(release): update package for ${{ needs.resolve-matrix.outputs.publish_version }}"

  publish-npm:
    needs: [resolve-matrix, publish]
    if: ${{
      !cancelled() &&
      needs.resolve-matrix.outputs.has_npm == 'true' &&
      needs.publish.result == 'success'
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout community repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Build npm package
        shell: bash
        env:
          PKG_VERSION: ${{ needs.resolve-matrix.outputs.publish_version }}
          RELEASE_TAG: ${{ needs.resolve-matrix.outputs.release_tag }}
        run: |
          set -euo pipefail
          python3 .github/scripts/build_npm_package.py \
            --config .github/npm/binary-targets.json \
            --templates .github/npm/templates \
            --readme .github/npm/README.package.md \
            --license LICENSE \
            --version "${PKG_VERSION}" \
            --release-tag "${RELEASE_TAG}" \
            --output /tmp/npm-root
          find /tmp/npm-root -maxdepth 4 -type f | sort

      - name: Publish npm package
        shell: bash
        env:
          PKG_VERSION: ${{ needs.resolve-matrix.outputs.publish_version }}
        run: |
          set -euo pipefail
          npm_tag="latest"
          if [[ "${PKG_VERSION}" == *-* ]]; then
            prerelease="${PKG_VERSION#*-}"
            prerelease="${prerelease%%.*}"
            npm_tag="$(printf '%s' "${prerelease}" | sed 's/[0-9].*$//' | tr '[:upper:]' '[:lower:]')"
            if [ -z "${npm_tag}" ]; then
              npm_tag="next"
            fi
          fi

          echo "Publishing fileuni@${PKG_VERSION} with npm tag ${npm_tag}"
          npm publish /tmp/npm-root/fileuni --access public --provenance --tag "${npm_tag}"

  build-pve-ct-template:
    needs: [resolve-matrix, build-cli]
    if: ${{
      !cancelled() &&
      needs.resolve-matrix.outputs.build_mode == 'full' &&
      needs.resolve-matrix.outputs.has_cli == 'true' &&
      (needs.resolve-matrix.outputs.has_cargo_dist != 'true' || needs.build-cli.result == 'success')
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout community repo
        uses: actions/checkout@v4

      - name: Download x86_64 musl CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: cli-x86_64-unknown-linux-musl
          path: /tmp/ct-artifact

      - name: Extract FileUni binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/ct-binary
          archive_zip="$(find /tmp/ct-artifact -type f -name '*.zip' | head -1 || true)"
          archive_tar="$(find /tmp/ct-artifact -type f -name '*.tar.xz' | head -1 || true)"
          if [ -n "${archive_zip}" ]; then
            unzip -q "${archive_zip}" -d /tmp/ct-binary
          elif [ -n "${archive_tar}" ]; then
            tar -xJf "${archive_tar}" -C /tmp/ct-binary
          else
            echo "::error::x86_64 musl archive not found for CT template"
            find /tmp/ct-artifact -maxdepth 3 -type f | sort
            exit 1
          fi
          binary="$(find /tmp/ct-binary -type f -name 'fileuni' | head -1 || true)"
          if [ -z "${binary}" ]; then
            echo "::error::fileuni binary not found after extraction"
            find /tmp/ct-binary -maxdepth 4 -type f | sort
            exit 1
          fi
          if [ "${binary}" != "/tmp/ct-binary/fileuni" ]; then
            install -Dm0755 "${binary}" /tmp/ct-binary/fileuni
          else
            chmod 0755 /tmp/ct-binary/fileuni
          fi

      - name: Install CT template dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq debootstrap zstd > /dev/null

      - name: Build PVE CT template
        shell: bash
        env:
          VERSION: ${{ needs.resolve-matrix.outputs.publish_version }}
        run: |
          set -euo pipefail
          chmod +x .github/scripts/build-pve-ct-template.sh
          .github/scripts/build-pve-ct-template.sh "${VERSION}" /tmp/ct-binary/fileuni /tmp/ct-output
          ls -lh /tmp/ct-output

      - name: Upload CT template artifact
        uses: actions/upload-artifact@v4
        with:
          name: ct-template-x86_64
          path: /tmp/ct-output/FileUni-cli-x86_64-linux-pve-ct-by-debian.tar.zst

  publish:
    needs:
      [
        resolve-matrix,
        build-cli,
        build-cli-cross,
        build-cli-android,
        build-cli-bsd,
        build-gui,
        build-gui-android,
        build-gui-ios,
        package-linux,
        publish-docker,
        build-pve-ct-template,
      ]
    if: ${{ !cancelled() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workspace source for release notes
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.resolve-matrix.outputs.workspace_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          fetch-depth: 0
          fetch-tags: true

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "{cli-*,gui-*,packages-*,ct-template-*}"
          path: /tmp/release
          merge-multiple: true

      - name: Generate release notes from commit history
        env:
          WORKSPACE_REF: ${{ needs.resolve-matrix.outputs.workspace_ref }}
          WORKSPACE_REPO: ${{ env.WORKSPACE_REPO }}
        shell: bash
        run: |
          set -euo pipefail

          cd workspace
          git fetch --tags --force >/dev/null 2>&1 || true

          current_ref="${WORKSPACE_REF}"
          current_sha="$(git rev-parse "${current_ref}")"
          prev_tag="$(git describe --tags --abbrev=0 "${current_sha}^" 2>/dev/null || true)"

          notes_file="/tmp/release-notes.md"
          {
            echo "## Changes"
            echo

            if [ -n "${prev_tag}" ]; then
              echo "Range: \`${prev_tag}\` → \`${current_ref}\`"
              echo
              commits="$(git log --no-merges --pretty=format:'- %s ([`%h`](https://github.com/'"${WORKSPACE_REPO}"'/commit/%H))' "${prev_tag}..${current_sha}" || true)"
            else
              echo "Range: initial history → \`${current_ref}\`"
              echo
              commits="$(git log --no-merges --pretty=format:'- %s ([`%h`](https://github.com/'"${WORKSPACE_REPO}"'/commit/%H))' "${current_sha}" || true)"
            fi

            if [ -z "${commits}" ]; then
              echo "- No code changes detected in this range."
            else
              printf '%s\n' "${commits}" | head -n 200
            fi

            echo
            echo "## Source"
            echo "- Workspace ref: [\`${current_ref}\`](https://github.com/${WORKSPACE_REPO}/tree/${current_ref})"
            echo "- Commit: [\`${current_sha}\`](https://github.com/${WORKSPACE_REPO}/commit/${current_sha})"
          } > "${notes_file}"

          echo "Generated release notes preview:"
          sed -n '1,80p' "${notes_file}"

      - name: Verify release notes source repository is workspace
        env:
          WORKSPACE_REPO: ${{ env.WORKSPACE_REPO }}
        shell: bash
        run: |
          set -euo pipefail
          notes_file="/tmp/release-notes.md"
          if [ ! -s "${notes_file}" ]; then
            echo "::error::Release notes file is missing or empty: ${notes_file}"
            exit 1
          fi

          if ! grep -q "https://github.com/${WORKSPACE_REPO}/commit/" "${notes_file}"; then
            echo "::error::Release notes do not contain workspace commit links"
            echo "Expected source repo: ${WORKSPACE_REPO}"
            sed -n '1,120p' "${notes_file}"
            exit 1
          fi

      - name: Keep only standardized release filenames
        run: |
          find /tmp/release -type f | while read -r f; do
            bn="$(basename "$f")"
            if [[ "$bn" != FileUni-* ]]; then
              rm -f "$f"
            fi
          done

      - name: Block source-code artifacts from release payload
        shell: bash
        run: |
          set -euo pipefail
          bad="$(find /tmp/release -type f \( \
            -name '*.rs' -o -name '*.lock'  \
            -o -name '*.yaml' -o -name '*.ts' -o -name '*.tsx' \
            -o -name '*.js' -o -name '*.jsx' -o -name '*.c' -o -name '*.h' -o -name '*.cpp' -o -name '*.hpp' \
            -o -name '*.java' -o -name '*.kt' -o -name '*.swift' -o -name '*.go' \
            -o -name '*.rb' -o -name '*.php' -o  \
          \) -print || true)"
          if [ -n "${bad}" ]; then
            echo "::error::Source-like files detected in release payload:"
            printf '%s\n' "${bad}"
            exit 1
          fi

      - name: List release files
        run: |
          echo "=== Release artifacts ==="
          find /tmp/release -type f | sort
          count="$(find /tmp/release -type f | wc -l)"
          echo "Total: ${count} files"
          if [ "${count}" -eq 0 ]; then
            echo "::error::No release artifacts found"
            exit 1
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-matrix.outputs.release_tag }}
          name: ${{ needs.resolve-matrix.outputs.release_tag }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          generate_release_notes: false
          fail_on_unmatched_files: false
          files: /tmp/release/*
          body_path: /tmp/release-notes.md
