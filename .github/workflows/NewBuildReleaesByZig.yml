name: New Build Release by Zig

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release label for FileUni-Community (e.g., v1.2.3); source defaults to main when workspace_ref is empty"
        required: true
        default: "v0.0.1-alpha.1"
      workspace_ref:
        description: "Source ref in fileuni/FileUni-WorkSpace (branch/tag/sha). Empty means main"
        required: false
        default: ""
      build_mode:
        description: "Build mode (full/medium/lite/minimal)"
        required: false
        default: "full"
      prerelease:
        description: "Mark this GitHub release as pre-release"
        type: boolean
        required: false
        default: true
      strict_packaging:
        description: "Fail when optional packagers/signing tools are missing"
        type: boolean
        required: false
        default: true
      trigger_source:
        description: "Who triggered this release"
        required: false
        default: "manual"

permissions:
  contents: write

concurrency:
  group: fileuni-community-new-zig-release-${{ github.event.inputs.release_tag || github.run_id }}
  cancel-in-progress: false

env:
  WORKSPACE_REPO: fileuni/FileUni-WorkSpace
  DEFAULT_WORKSPACE_REF: main

jobs:
  resolve-meta:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      resolved_ref: ${{ steps.meta.outputs.resolved_ref }}
      resolved_mode: ${{ steps.meta.outputs.resolved_mode }}
      resolved_prerelease: ${{ steps.meta.outputs.resolved_prerelease }}
      trigger_source: ${{ steps.meta.outputs.trigger_source }}
      strict_packaging: ${{ steps.strict.outputs.strict_packaging }}
      has_android_target: ${{ steps.cap.outputs.has_android_target }}
      has_apple_target: ${{ steps.cap.outputs.has_apple_target }}
      linux_windows_apps: ${{ steps.cap.outputs.linux_windows_apps }}
      linux_windows_include_glob: ${{ steps.cap.outputs.linux_windows_include_glob }}
      apple_apps: ${{ steps.cap.outputs.apple_apps }}
      apple_include_glob: ${{ steps.cap.outputs.apple_include_glob }}
      android_apps: ${{ steps.cap.outputs.android_apps }}
      android_include_glob: ${{ steps.cap.outputs.android_include_glob }}
    steps:
      - name: Checkout workspace source (bootstrap)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ vars.WORKSPACE_DEFAULT_REF || env.DEFAULT_WORKSPACE_REF }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          fetch-depth: 0
          submodules: false

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Preflight CI
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail
          zig build release-run -- preflight:ci

      - name: Normalize release inputs
        id: normalized
        shell: bash
        run: |
          set -euo pipefail
          release_tag="${{ github.event.inputs.release_tag }}"
          workspace_ref="${{ github.event.inputs.workspace_ref }}"
          build_mode="${{ github.event.inputs.build_mode }}"
          prerelease="${{ github.event.inputs.prerelease }}"
          trigger_source="${{ github.event.inputs.trigger_source }}"
          strict_packaging_input="${{ github.event.inputs.strict_packaging }}"

          if [ -z "${release_tag}" ]; then
            release_tag="v0.0.0-${GITHUB_RUN_NUMBER}"
          fi
          if [ -z "${workspace_ref}" ]; then
            workspace_ref="${DEFAULT_WORKSPACE_REF}"
          fi
          if [ -z "${build_mode}" ]; then
            build_mode="full"
          fi
          if [ -z "${prerelease}" ]; then
            prerelease="true"
          fi
          if [ -z "${trigger_source}" ]; then
            trigger_source="manual"
          fi
          if [ -z "${strict_packaging_input}" ]; then
            strict_packaging_input="true"
          fi

          {
            echo "release_tag=${release_tag}"
            echo "workspace_ref=${workspace_ref}"
            echo "build_mode=${build_mode}"
            echo "prerelease=${prerelease}"
            echo "trigger_source=${trigger_source}"
            echo "strict_packaging=${strict_packaging_input}"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve release metadata and source ref
        id: meta
        env:
          FILEUNI_WORKSPACE_PAT: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail
          zig build release-run -- ci:resolve-community-build \
            --release-tag "${{ steps.normalized.outputs.release_tag }}" \
            --workspace-ref "${{ steps.normalized.outputs.workspace_ref }}" \
            --build-mode "${{ steps.normalized.outputs.build_mode }}" \
            --prerelease "${{ steps.normalized.outputs.prerelease }}" \
            --trigger-source "${{ steps.normalized.outputs.trigger_source }}" \
            --workspace-repo "${WORKSPACE_REPO}" \
            --workspace-token-env "FILEUNI_WORKSPACE_PAT" \
            --fallback-ref "${{ vars.WORKSPACE_DEFAULT_REF }}" \
            --default-fallback-ref "${DEFAULT_WORKSPACE_REF}"

      - name: Export strict packaging option
        id: strict
        shell: bash
        run: |
          set -euo pipefail
          strict_packaging="${{ steps.normalized.outputs.strict_packaging }}"
          echo "strict_packaging=${strict_packaging}" >> "$GITHUB_OUTPUT"

      - name: Resolve capability flags from build matrix
        id: cap
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail
          MATRIX_FILE="script-new-zig/build_matrix.jsonc"
          MODE="${{ steps.meta.outputs.resolved_mode }}"

          jq -e --arg mode "$MODE" '.[$mode]' "$MATRIX_FILE" >/dev/null

          has_android_target="$(jq -r --arg mode "$MODE" '
            (
              (.[$mode].cli.targets // []) +
              (.[$mode].gui.targets // [])
            ) | any(. == "aarch64-linux-android")
          ' "$MATRIX_FILE")"

          has_apple_target="$(jq -r --arg mode "$MODE" '
            (
              (.[$mode].cli.targets // []) +
              (.[$mode].gui.targets // [])
            ) | any(test("-apple-darwin$"))
          ' "$MATRIX_FILE")"

          linux_windows_apps="$(jq -r '.ci_profiles.linux_windows.apps | join(",")' "$MATRIX_FILE")"
          linux_windows_include_glob="$(jq -r '.ci_profiles.linux_windows.target_include_glob' "$MATRIX_FILE")"
          apple_apps="$(jq -r '.ci_profiles.apple.apps | join(",")' "$MATRIX_FILE")"
          apple_include_glob="$(jq -r '.ci_profiles.apple.target_include_glob' "$MATRIX_FILE")"
          android_apps="$(jq -r '.ci_profiles.android.apps | join(",")' "$MATRIX_FILE")"
          android_include_glob="$(jq -r '.ci_profiles.android.target_include_glob' "$MATRIX_FILE")"

          {
            echo "has_android_target=${has_android_target}"
            echo "has_apple_target=${has_apple_target}"
            echo "linux_windows_apps=${linux_windows_apps}"
            echo "linux_windows_include_glob=${linux_windows_include_glob}"
            echo "apple_apps=${apple_apps}"
            echo "apple_include_glob=${apple_include_glob}"
            echo "android_apps=${android_apps}"
            echo "android_include_glob=${android_include_glob}"
          } >> "$GITHUB_OUTPUT"

  build-frontend:
    needs: resolve-meta
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workspace source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.resolve-meta.outputs.resolved_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          fetch-depth: 0
          submodules: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build shared frontends once
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail
          bun install --cwd frontends/cli
          bun run --cwd frontends/cli build
          bun install --cwd frontends/gui
          bun run --cwd frontends/gui build
          test -f frontends/cli/dist/index.html
          test -f frontends/gui/dist/index.html

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ needs.resolve-meta.outputs.release_tag }}
          path: |
            workspace/frontends/cli/dist
            workspace/frontends/gui/dist

  build-linux-windows:
    needs: [resolve-meta, build-frontend]
    runs-on: ubuntu-latest
    env:
      FILEUNI_APPS: ${{ needs.resolve-meta.outputs.linux_windows_apps }}
      FILEUNI_TARGET_INCLUDE_GLOB: ${{ needs.resolve-meta.outputs.linux_windows_include_glob }}
      FILEUNI_SKIP_FRONTEND_BUILD: "1"
      FILEUNI_ENABLE_SCCACHE: "1"
      CARGO_TOOLS_ROOT: ${{ github.workspace }}/.cargo-tools
    steps:
      - name: Resolve runner output directory
        shell: bash
        run: |
          set -euo pipefail
          echo "OUTPUT_DIR=${RUNNER_TEMP}/FileUniRelease-linux-windows" >> "$GITHUB_ENV"

      - name: Checkout workspace source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.resolve-meta.outputs.resolved_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          fetch-depth: 0
          submodules: true

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Cache cargo installed tools
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cargo-tools
          key: ${{ runner.os }}-new-zig-cargo-tools-v2-tauri2_10
          restore-keys: |
            ${{ runner.os }}-new-zig-cargo-tools-v2-
            ${{ runner.os }}-new-zig-cargo-tools-

      - name: Add cargo tools to PATH
        shell: bash
        run: |
          set -euo pipefail
          echo "${CARGO_TOOLS_ROOT}/bin" >> "$GITHUB_PATH"

      - name: Cache Cargo registry and git index
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-new-zig-cargo-registry-${{ hashFiles('workspace/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-new-zig-cargo-registry-

      - name: Cache Rust target directory
        uses: actions/cache@v4
        with:
          path: workspace/target
          key: ${{ runner.os }}-new-zig-cargo-target-linux-windows-${{ needs.resolve-meta.outputs.resolved_mode }}-${{ hashFiles('workspace/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-new-zig-cargo-target-linux-windows-${{ needs.resolve-meta.outputs.resolved_mode }}-
            ${{ runner.os }}-new-zig-cargo-target-linux-windows-

      - name: Download prebuilt frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-${{ needs.resolve-meta.outputs.release_tag }}
          path: workspace

      - name: Normalize frontend dist layout
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail

          ensure_dist() {
            expected="$1"
            shift
            if [ -f "${expected}/index.html" ]; then
              return 0
            fi
            for candidate in "$@"; do
              if [ -f "${candidate}/index.html" ]; then
                rm -rf "${expected}"
                mkdir -p "$(dirname "${expected}")"
                cp -a "${candidate}" "${expected}"
                return 0
              fi
            done
            echo "::error::missing frontend dist: ${expected}/index.html"
            return 1
          }

          ensure_dist "frontends/cli/dist" "frontends/cli/dist" "workspace/frontends/cli/dist" "cli/dist"
          ensure_dist "frontends/gui/dist" "frontends/gui/dist" "workspace/frontends/gui/dist" "gui/dist"

      - name: Prepare build dependencies and cross tools
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail
          zig build release-run -- ci:prepare-tools \
            --cargo-tools-root "${CARGO_TOOLS_ROOT}" \
            --tauri-version "~2.10" \
            --skip-system-deps="false" \
            --skip-fpm="false"

      - name: Build release artifacts (linux/windows/bsd)
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail
          rm -rf "$OUTPUT_DIR"
          mkdir -p "$OUTPUT_DIR"
          zig build release-run -- release:build-all "${{ needs.resolve-meta.outputs.resolved_mode }}" --output-dir "$OUTPUT_DIR"
          zig build release-run -- ci:assert-artifacts --output-dir "$OUTPUT_DIR"

      - name: Upload core artifacts (linux/windows)
        uses: actions/upload-artifact@v4
        with:
          name: release-core-linux-windows-${{ needs.resolve-meta.outputs.release_tag }}
          path: ${{ env.OUTPUT_DIR }}/*

  build-apple:
    if: needs.resolve-meta.outputs.has_apple_target == 'true'
    needs: [resolve-meta, build-frontend]
    runs-on: macos-14
    env:
      FILEUNI_APPS: ${{ needs.resolve-meta.outputs.apple_apps }}
      FILEUNI_TARGET_INCLUDE_GLOB: ${{ needs.resolve-meta.outputs.apple_include_glob }}
      FILEUNI_SKIP_FRONTEND_BUILD: "1"
      CARGO_TOOLS_ROOT: ${{ github.workspace }}/.cargo-tools
    steps:
      - name: Resolve runner output directory
        shell: bash
        run: |
          set -euo pipefail
          echo "OUTPUT_DIR=${RUNNER_TEMP}/FileUniRelease-apple" >> "$GITHUB_ENV"

      - name: Checkout workspace source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.resolve-meta.outputs.resolved_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          fetch-depth: 0
          submodules: true

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Add cargo tools to PATH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${CARGO_TOOLS_ROOT}/bin"
          echo "${CARGO_TOOLS_ROOT}/bin" >> "$GITHUB_PATH"

      - name: Download prebuilt frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-${{ needs.resolve-meta.outputs.release_tag }}
          path: workspace

      - name: Prepare Apple build tools
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail
          xcodebuild -version
          zig build release-run -- ci:prepare-tools \
            --cargo-tools-root "${CARGO_TOOLS_ROOT}" \
            --tauri-version "~2.10" \
            --skip-system-deps="true" \
            --skip-fpm="true"

      - name: Build release artifacts (apple)
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail
          rm -rf "$OUTPUT_DIR"
          mkdir -p "$OUTPUT_DIR"
          zig build release-run -- release:build-all "${{ needs.resolve-meta.outputs.resolved_mode }}" --output-dir "$OUTPUT_DIR"
          zig build release-run -- ci:assert-artifacts --output-dir "$OUTPUT_DIR"

      - name: Upload core artifacts (apple)
        uses: actions/upload-artifact@v4
        with:
          name: release-core-apple-${{ needs.resolve-meta.outputs.release_tag }}
          path: ${{ env.OUTPUT_DIR }}/*

  build-android:
    if: needs.resolve-meta.outputs.has_android_target == 'true'
    needs: [resolve-meta, build-frontend]
    runs-on: ubuntu-latest
    env:
      FILEUNI_APPS: ${{ needs.resolve-meta.outputs.android_apps }}
      FILEUNI_TARGET_INCLUDE_GLOB: ${{ needs.resolve-meta.outputs.android_include_glob }}
      FILEUNI_SKIP_FRONTEND_BUILD: "1"
      CARGO_TOOLS_ROOT: ${{ github.workspace }}/.cargo-tools
    steps:
      - name: Resolve runner output directory
        shell: bash
        run: |
          set -euo pipefail
          echo "OUTPUT_DIR=${RUNNER_TEMP}/FileUniRelease-android" >> "$GITHUB_ENV"

      - name: Checkout workspace source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.resolve-meta.outputs.resolved_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          fetch-depth: 0
          submodules: true

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Setup Java for Android
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare Android SDK and targets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.android"
          touch "${HOME}/.android/repositories.cfg"
          if [ -n "${ANDROID_SDK_ROOT:-}" ]; then
            sdk_root="${ANDROID_SDK_ROOT}"
          elif [ -n "${ANDROID_HOME:-}" ]; then
            sdk_root="${ANDROID_HOME}"
          else
            echo "::error::ANDROID_SDK_ROOT/ANDROID_HOME is not set"
            exit 1
          fi
          export ANDROID_SDK_ROOT="${sdk_root}"
          export ANDROID_HOME="${sdk_root}"
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          rustup target add aarch64-linux-android

      - name: Add cargo tools to PATH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${CARGO_TOOLS_ROOT}/bin"
          echo "${CARGO_TOOLS_ROOT}/bin" >> "$GITHUB_PATH"

      - name: Download prebuilt frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-${{ needs.resolve-meta.outputs.release_tag }}
          path: workspace

      - name: Prepare Android build tools
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail
          zig build release-run -- ci:prepare-tools \
            --cargo-tools-root "${CARGO_TOOLS_ROOT}" \
            --tauri-version "~2.10" \
            --skip-system-deps="true" \
            --skip-fpm="true"

      - name: Build release artifacts (android)
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail
          rm -rf "$OUTPUT_DIR"
          mkdir -p "$OUTPUT_DIR"
          zig build release-run -- release:build-all "${{ needs.resolve-meta.outputs.resolved_mode }}" --output-dir "$OUTPUT_DIR"
          zig build release-run -- ci:assert-artifacts --output-dir "$OUTPUT_DIR"

      - name: Upload core artifacts (android)
        uses: actions/upload-artifact@v4
        with:
          name: release-core-android-${{ needs.resolve-meta.outputs.release_tag }}
          path: ${{ env.OUTPUT_DIR }}/*

  publish:
    if: ${{ always() && !cancelled() }}
    needs: [resolve-meta, build-linux-windows, build-apple, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Validate upstream job results
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ needs.build-linux-windows.result }}" != "success" ]; then
            echo "::error::build-linux-windows failed"
            exit 1
          fi
          if [ "${{ needs.resolve-meta.outputs.has_apple_target }}" = "true" ] && [ "${{ needs.build-apple.result }}" != "success" ]; then
            echo "::error::build-apple failed"
            exit 1
          fi
          if [ "${{ needs.resolve-meta.outputs.has_android_target }}" = "true" ] && [ "${{ needs.build-android.result }}" != "success" ]; then
            echo "::error::build-android failed"
            exit 1
          fi

      - name: Checkout workspace source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.resolve-meta.outputs.resolved_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          fetch-depth: 0
          submodules: false

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-core-*-${{ needs.resolve-meta.outputs.release_tag }}
          path: /tmp/FileUniRelease
          merge-multiple: true

      - name: Ensure merged artifacts exist
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/FileUniRelease
          count="$(find /tmp/FileUniRelease -maxdepth 1 -type f | wc -l | tr -d ' ')"
          echo "artifact-count=${count}"
          if [ "$count" -eq 0 ]; then
            echo "::error::No release artifacts found in /tmp/FileUniRelease"
            exit 1
          fi

      - name: Publish GitHub release via Zig bridge
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail
          zig build release-run -- ci:publish-community-release \
            --repo "${GITHUB_REPOSITORY}" \
            --release-tag "${{ needs.resolve-meta.outputs.release_tag }}" \
            --workspace-ref "${{ needs.resolve-meta.outputs.resolved_ref }}" \
            --build-mode "${{ needs.resolve-meta.outputs.resolved_mode }}" \
            --trigger-source "${{ needs.resolve-meta.outputs.trigger_source }}" \
            --prerelease "${{ needs.resolve-meta.outputs.resolved_prerelease }}" \
            --output-dir "/tmp/FileUniRelease" \
            --token-env "GITHUB_TOKEN"

      - name: Add workflow summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d "workspace" ]; then
            exit 0
          fi
          if ! command -v zig >/dev/null 2>&1; then
            exit 0
          fi
          cd workspace
          zig build release-run -- ci:write-release-summary \
            --release-tag "${{ needs.resolve-meta.outputs.release_tag }}" \
            --workspace-ref "${{ needs.resolve-meta.outputs.resolved_ref }}" \
            --build-mode "${{ needs.resolve-meta.outputs.resolved_mode }}" \
            --prerelease "${{ needs.resolve-meta.outputs.resolved_prerelease }}" \
            --trigger-source "${{ needs.resolve-meta.outputs.trigger_source }}"
