name: New Build Release by Zig (Dist + Tauri)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag for FileUni-Community (e.g. v1.2.3)"
        required: true
        default: "v0.0.1-alpha.1"
      workspace_ref:
        description: "Source ref in FileUni/FileUni-WorkSpace (branch/tag/sha). Empty means main"
        required: false
        default: ""
      build_mode:
        description: "Build mode"
        required: false
        default: "full"
      prerelease:
        description: "Mark GitHub release as pre-release"
        type: boolean
        required: false
        default: true
      trigger_source:
        description: "Who triggered this run"
        required: false
        default: "manual"

permissions:
  contents: write

concurrency:
  group: fileuni-community-dist-tauri-${{ github.event.inputs.release_tag || github.run_id }}
  cancel-in-progress: false

env:
  WORKSPACE_REPO: FileUni/FileUni-WorkSpace
  DEFAULT_WORKSPACE_REF: main

jobs:
  resolve-meta:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      resolved_ref: ${{ steps.meta.outputs.resolved_ref }}
      resolved_mode: ${{ steps.meta.outputs.resolved_mode }}
      resolved_prerelease: ${{ steps.meta.outputs.resolved_prerelease }}
      trigger_source: ${{ steps.meta.outputs.trigger_source }}
      dist_matrix: ${{ steps.plan.outputs.dist_matrix }}
      tauri_desktop_matrix: ${{ steps.plan.outputs.tauri_desktop_matrix }}
      tauri_android_matrix: ${{ steps.plan.outputs.tauri_android_matrix }}
      tauri_ios_matrix: ${{ steps.plan.outputs.tauri_ios_matrix }}
      has_dist: ${{ steps.plan.outputs.has_dist }}
      has_tauri_desktop: ${{ steps.plan.outputs.has_tauri_desktop }}
      has_android: ${{ steps.plan.outputs.has_android }}
      has_ios: ${{ steps.plan.outputs.has_ios }}
      android_ready: ${{ steps.plan.outputs.android_ready }}
      ios_ready: ${{ steps.plan.outputs.ios_ready }}
    steps:
      - name: Checkout workspace source (bootstrap)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ vars.WORKSPACE_DEFAULT_REF || env.DEFAULT_WORKSPACE_REF }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          fetch-depth: 0
          submodules: false

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Preflight CI
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail
          zig build release-run -- preflight:ci

      - name: Normalize workflow inputs
        id: normalized
        shell: bash
        run: |
          set -euo pipefail
          release_tag="${{ github.event.inputs.release_tag }}"
          workspace_ref="${{ github.event.inputs.workspace_ref }}"
          build_mode="${{ github.event.inputs.build_mode }}"
          prerelease="${{ github.event.inputs.prerelease }}"
          trigger_source="${{ github.event.inputs.trigger_source }}"

          if [ -z "${release_tag}" ]; then
            release_tag="v0.0.0-${GITHUB_RUN_NUMBER}"
          fi
          if [ -z "${workspace_ref}" ]; then
            workspace_ref="${DEFAULT_WORKSPACE_REF}"
          fi
          if [ -z "${build_mode}" ]; then
            build_mode="full"
          fi
          if [ -z "${prerelease}" ]; then
            prerelease="true"
          fi
          if [ -z "${trigger_source}" ]; then
            trigger_source="manual"
          fi

          {
            echo "release_tag=${release_tag}"
            echo "workspace_ref=${workspace_ref}"
            echo "build_mode=${build_mode}"
            echo "prerelease=${prerelease}"
            echo "trigger_source=${trigger_source}"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve release metadata and source ref
        id: meta
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail
          zig build release-run -- ci:resolve-community-build \
            --release-tag "${{ steps.normalized.outputs.release_tag }}" \
            --workspace-ref "${{ steps.normalized.outputs.workspace_ref }}" \
            --build-mode "${{ steps.normalized.outputs.build_mode }}" \
            --prerelease "${{ steps.normalized.outputs.prerelease }}" \
            --trigger-source "${{ steps.normalized.outputs.trigger_source }}" \
            --fallback-ref "${{ vars.WORKSPACE_DEFAULT_REF }}" \
            --default-fallback-ref "${DEFAULT_WORKSPACE_REF}"

      - name: Resolve mode build plan
        id: plan
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail
          zig build release-run -- ci:resolve-build-plan --build-mode "${{ steps.meta.outputs.resolved_mode }}"

  build-frontends:
    needs: resolve-meta
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workspace source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.resolve-meta.outputs.resolved_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          fetch-depth: 0
          submodules: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            workspace/frontends/node_modules
            workspace/frontends/cli/node_modules
            workspace/frontends/gui/node_modules
            workspace/frontends/shared/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('workspace/frontends/bun.lock', 'workspace/frontends/*/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Build frontend bundles
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail
          bun install --cwd frontends
          bun run --cwd frontends/cli build
          bun run --cwd frontends/gui build
          test -f frontends/cli/dist/index.html
          test -f frontends/gui/dist/index.html

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ needs.resolve-meta.outputs.release_tag }}
          path: |
            workspace/frontends/cli/dist
            workspace/frontends/gui/dist

  build-cli-dist:
    if: needs.resolve-meta.outputs.has_dist == 'true'
    needs: [resolve-meta, build-frontends]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve-meta.outputs.dist_matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout workspace source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.resolve-meta.outputs.resolved_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          fetch-depth: 0
          submodules: true

      - name: Download prebuilt frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-${{ needs.resolve-meta.outputs.release_tag }}
          path: workspace

      - name: Normalize frontend dist layout
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail

          ensure_dist() {
            expected="$1"
            shift
            if [ -f "${expected}/index.html" ]; then
              return 0
            fi
            for candidate in "$@"; do
              if [ -f "${candidate}/index.html" ]; then
                rm -rf "${expected}"
                mkdir -p "$(dirname "${expected}")"
                cp -a "${candidate}" "${expected}"
                return 0
              fi
            done
            echo "::error::missing frontend dist: ${expected}/index.html"
            return 1
          }

          ensure_dist "frontends/cli/dist" "frontends/cli/dist" "workspace/frontends/cli/dist" "cli/dist"
          ensure_dist "frontends/gui/dist" "frontends/gui/dist" "workspace/frontends/gui/dist" "gui/dist"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Install cargo-dist
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-dist@0.28.0

      - name: Verify cargo-dist binary
        shell: bash
        run: |
          set -euo pipefail
          command -v dist
          dist --version

      - name: Install Linux native deps for musl targets
        if: startsWith(matrix.target, 'x86_64-unknown-linux-musl')
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install Linux cross linker for aarch64-gnu
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: workspace
          key: cli-dist-${{ matrix.target }}

      - name: Build CLI artifacts via cargo-dist
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail
          dist build --target "${{ matrix.target }}" --artifacts=local

      - name: Assert CLI dist output exists
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail
          count="$(find target/distrib -maxdepth 1 -type f | wc -l | tr -d ' ')"
          echo "cli-dist-file-count=${count}"
          if [ "${count}" -eq 0 ]; then
            echo "::error::cargo-dist produced no files for ${{ matrix.target }}"
            exit 1
          fi

      - name: Upload CLI dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-cli-${{ needs.resolve-meta.outputs.release_tag }}-${{ matrix.target }}
          path: workspace/target/distrib/*

  build-tauri-desktop:
    if: needs.resolve-meta.outputs.has_tauri_desktop == 'true'
    needs: [resolve-meta, build-frontends]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve-meta.outputs.tauri_desktop_matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout workspace source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.resolve-meta.outputs.resolved_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          fetch-depth: 0
          submodules: true

      - name: Download prebuilt frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-${{ needs.resolve-meta.outputs.release_tag }}
          path: workspace

      - name: Normalize frontend dist layout
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail

          ensure_dist() {
            expected="$1"
            shift
            if [ -f "${expected}/index.html" ]; then
              return 0
            fi
            for candidate in "$@"; do
              if [ -f "${candidate}/index.html" ]; then
                rm -rf "${expected}"
                mkdir -p "$(dirname "${expected}")"
                cp -a "${candidate}" "${expected}"
                return 0
              fi
            done
            echo "::error::missing frontend dist: ${expected}/index.html"
            return 1
          }

          ensure_dist "frontends/gui/dist" "frontends/gui/dist" "workspace/frontends/gui/dist" "gui/dist"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: workspace
          key: tauri-desktop-${{ matrix.target }}

      - name: Install tauri-cli
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli@2.10.0

      - name: Install Linux Tauri dependencies
        if: startsWith(matrix.runner, 'ubuntu')
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build desktop GUI via tauri-action
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: workspace/apps/gui
          tauriScript: cargo tauri
          args: ${{ matrix.args }}

      - name: Collect desktop GUI artifacts
        shell: bash
        run: |
          set -euo pipefail
          OUT_DIR="${RUNNER_TEMP}/tauri-desktop-${{ matrix.target }}"
          mkdir -p "${OUT_DIR}"
          find workspace/apps/gui/target -type f \
            \( -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' -o -name '*.msi' -o -name '*.exe' -o -name '*.dmg' -o -name '*.zip' -o -name '*.tar.gz' \) \
            -exec cp {} "${OUT_DIR}/" \;
          count="$(find "${OUT_DIR}" -maxdepth 1 -type f | wc -l | tr -d ' ')"
          echo "tauri-desktop-file-count=${count}"
          if [ "${count}" -eq 0 ]; then
            echo "::error::no Tauri desktop artifacts found for ${{ matrix.target }}"
            exit 1
          fi

      - name: Upload desktop GUI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-tauri-desktop-${{ needs.resolve-meta.outputs.release_tag }}-${{ matrix.target }}
          path: ${{ runner.temp }}/tauri-desktop-${{ matrix.target }}/*

  build-tauri-android:
    if: needs.resolve-meta.outputs.has_android == 'true'
    needs: [resolve-meta, build-frontends]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve-meta.outputs.tauri_android_matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout workspace source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.resolve-meta.outputs.resolved_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          fetch-depth: 0
          submodules: true

      - name: Download prebuilt frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-${{ needs.resolve-meta.outputs.release_tag }}
          path: workspace

      - name: Normalize frontend dist layout
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail

          ensure_dist() {
            expected="$1"
            shift
            if [ -f "${expected}/index.html" ]; then
              return 0
            fi
            for candidate in "$@"; do
              if [ -f "${candidate}/index.html" ]; then
                rm -rf "${expected}"
                mkdir -p "$(dirname "${expected}")"
                cp -a "${candidate}" "${expected}"
                return 0
              fi
            done
            echo "::error::missing frontend dist: ${expected}/index.html"
            return 1
          }

          ensure_dist "frontends/gui/dist" "frontends/gui/dist" "workspace/frontends/gui/dist" "gui/dist"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: workspace
          key: tauri-android-aarch64

      - name: Install tauri-cli
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli@2.10.0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.android"
          touch "${HOME}/.android/repositories.cfg"
          sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [ -z "${sdk_root}" ]; then
            echo "::error::ANDROID_SDK_ROOT/ANDROID_HOME is not set"
            exit 1
          fi
          export ANDROID_SDK_ROOT="${sdk_root}"
          export ANDROID_HOME="${sdk_root}"
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=${sdk_root}/ndk/27.0.12077973" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=${sdk_root}/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Initialize Android scaffold if missing
        shell: bash
        working-directory: workspace/apps/gui
        run: |
          set -euo pipefail
          if [ -d "gen/android" ] || [ -d "src-tauri/gen/android" ]; then
            echo "Android scaffold already exists."
          else
            cargo tauri android init --ci
          fi

      - name: Build Android GUI via tauri-action
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: workspace/apps/gui
          tauriScript: cargo tauri android
          args: ${{ matrix.args }}

      - name: Collect Android artifacts
        shell: bash
        run: |
          set -euo pipefail
          OUT_DIR="${RUNNER_TEMP}/tauri-android"
          mkdir -p "${OUT_DIR}"
          find workspace/apps/gui -type f \( -name '*.apk' -o -name '*.aab' \) -exec cp {} "${OUT_DIR}/" \;
          count="$(find "${OUT_DIR}" -maxdepth 1 -type f | wc -l | tr -d ' ')"
          echo "tauri-android-file-count=${count}"
          if [ "${count}" -eq 0 ]; then
            echo "::error::no Android artifacts found"
            exit 1
          fi

      - name: Upload Android GUI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-tauri-android-${{ needs.resolve-meta.outputs.release_tag }}-aarch64
          path: ${{ runner.temp }}/tauri-android/*

  build-tauri-ios:
    if: needs.resolve-meta.outputs.has_ios == 'true'
    needs: [resolve-meta, build-frontends]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve-meta.outputs.tauri_ios_matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout workspace source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.resolve-meta.outputs.resolved_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          fetch-depth: 0
          submodules: true

      - name: Download prebuilt frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-${{ needs.resolve-meta.outputs.release_tag }}
          path: workspace

      - name: Normalize frontend dist layout
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail

          ensure_dist() {
            expected="$1"
            shift
            if [ -f "${expected}/index.html" ]; then
              return 0
            fi
            for candidate in "$@"; do
              if [ -f "${candidate}/index.html" ]; then
                rm -rf "${expected}"
                mkdir -p "$(dirname "${expected}")"
                cp -a "${candidate}" "${expected}"
                return 0
              fi
            done
            echo "::error::missing frontend dist: ${expected}/index.html"
            return 1
          }

          ensure_dist "frontends/gui/dist" "frontends/gui/dist" "workspace/frontends/gui/dist" "gui/dist"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: workspace
          key: tauri-ios-aarch64

      - name: Install tauri-cli
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli@2.10.0

      - name: Initialize iOS scaffold if missing
        shell: bash
        working-directory: workspace/apps/gui
        run: |
          set -euo pipefail
          if [ -d "gen/apple" ] || [ -d "gen/ios" ] || [ -d "src-tauri/gen/apple" ] || [ -d "src-tauri/gen/ios" ]; then
            echo "iOS scaffold already exists."
            exit 0
          fi
          if cargo tauri ios init --help >/dev/null 2>&1; then
            cargo tauri ios init --ci
          else
            echo "::error::cargo tauri ios command is unavailable on this runner."
            exit 1
          fi

      - name: Build iOS GUI via tauri-action (unsigned)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: workspace/apps/gui
          tauriScript: cargo tauri ios
          args: ${{ matrix.args }}

      - name: Collect iOS artifacts
        shell: bash
        run: |
          set -euo pipefail
          OUT_DIR="${RUNNER_TEMP}/tauri-ios"
          mkdir -p "${OUT_DIR}"
          find workspace/apps/gui -type f -name '*.ipa' -exec cp {} "${OUT_DIR}/" \;
          count="$(find "${OUT_DIR}" -maxdepth 1 -type f | wc -l | tr -d ' ')"
          echo "tauri-ios-file-count=${count}"
          if [ "${count}" -eq 0 ]; then
            echo "::error::no iOS ipa artifacts found"
            exit 1
          fi

      - name: Upload iOS GUI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-tauri-ios-${{ needs.resolve-meta.outputs.release_tag }}-aarch64
          path: ${{ runner.temp }}/tauri-ios/*

  publish:
    if: ${{ always() && !cancelled() }}
    needs:
      - resolve-meta
      - build-cli-dist
      - build-tauri-desktop
      - build-tauri-android
      - build-tauri-ios
    runs-on: ubuntu-latest
    steps:
      - name: Validate build job results
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ needs.resolve-meta.outputs.has_dist }}" = "true" ] && [ "${{ needs.build-cli-dist.result }}" != "success" ]; then
            echo "::error::build-cli-dist failed"
            exit 1
          fi

          if [ "${{ needs.resolve-meta.outputs.has_tauri_desktop }}" = "true" ] && [ "${{ needs.build-tauri-desktop.result }}" != "success" ]; then
            echo "::error::build-tauri-desktop failed"
            exit 1
          fi

          if [ "${{ needs.resolve-meta.outputs.has_android }}" = "true" ] && [ "${{ needs.build-tauri-android.result }}" != "success" ]; then
            echo "::error::build-tauri-android failed"
            exit 1
          fi

          if [ "${{ needs.resolve-meta.outputs.has_ios }}" = "true" ] && [ "${{ needs.build-tauri-ios.result }}" != "success" ]; then
            echo "::error::build-tauri-ios failed"
            exit 1
          fi

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*-${{ needs.resolve-meta.outputs.release_tag }}-*
          path: /tmp/FileUniRelease
          merge-multiple: true

      - name: Ensure release artifacts exist
        shell: bash
        run: |
          set -euo pipefail
          count="$(find /tmp/FileUniRelease -maxdepth 1 -type f | wc -l | tr -d ' ')"
          echo "artifact-count=${count}"
          if [ "${count}" -eq 0 ]; then
            echo "::error::No release artifacts found"
            exit 1
          fi

      - name: Generate release note body
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/release-notes.md <<NOTES
          Automated release by modern stack:
          - cargo-dist (CLI)
          - tauri-action (GUI desktop/mobile)
          - action-gh-release (publishing)

          Build metadata:
          - Source ref: ${{ needs.resolve-meta.outputs.resolved_ref }}
          - Build mode: ${{ needs.resolve-meta.outputs.resolved_mode }}
          - Trigger source: ${{ needs.resolve-meta.outputs.trigger_source }}
          - Android project ready: ${{ needs.resolve-meta.outputs.android_ready }}
          - iOS project ready: ${{ needs.resolve-meta.outputs.ios_ready }}
          NOTES

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-meta.outputs.release_tag }}
          name: FileUni-Community ${{ needs.resolve-meta.outputs.release_tag }}
          prerelease: ${{ needs.resolve-meta.outputs.resolved_prerelease == 'true' }}
          draft: false
          fail_on_unmatched_files: true
          files: |
            /tmp/FileUniRelease/*
          body_path: /tmp/release-notes.md

      - name: Checkout workspace source (summary)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.resolve-meta.outputs.resolved_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          fetch-depth: 0
          submodules: false

      - name: Setup Zig (summary)
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Write workflow summary
        if: always()
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail
          zig build release-run -- ci:write-release-summary \
            --release-tag "${{ needs.resolve-meta.outputs.release_tag }}" \
            --workspace-ref "${{ needs.resolve-meta.outputs.resolved_ref }}" \
            --build-mode "${{ needs.resolve-meta.outputs.resolved_mode }}" \
