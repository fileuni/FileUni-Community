name: Community Build and Release by Zig

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag in FileUni-Community (for example: v1.2.3)"
        required: true
        default: "0.0.1-alpha4.1"
      workspace_ref:
        description: "Source ref in fileuni/FileUni-WorkSpace (tag/branch/sha). Empty = release_tag"
        required: false
        default: ""
      build_mode:
        description: "Build mode override (full/medium/lite/minimal). Empty = vars.BUILD_MODE then minimal"
        required: false
        default: "minimal"
      prerelease:
        description: "Mark this GitHub release as pre-release"
        type: boolean
        required: false
        default: true
      trigger_source:
        description: "Who triggered this release"
        required: false
        default: "manual"

permissions:
  contents: write

concurrency:
  group: fileuni-community-release-zig-${{ inputs.release_tag || github.run_id }}
  cancel-in-progress: false

env:
  WORKSPACE_REPO: fileuni/FileUni-WorkSpace
  OUTPUT_DIR: /tmp/FileUniRelease
  DEFAULT_WORKSPACE_REF: main

jobs:
  resolve-meta:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      resolved_ref: ${{ steps.meta.outputs.resolved_ref }}
      resolved_mode: ${{ steps.meta.outputs.resolved_mode }}
      resolved_prerelease: ${{ steps.meta.outputs.resolved_prerelease }}
      trigger_source: ${{ steps.meta.outputs.trigger_source }}
    steps:
      - name: Checkout private workspace source (bootstrap)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ vars.WORKSPACE_DEFAULT_REF || env.DEFAULT_WORKSPACE_REF }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          fetch-depth: 0
          submodules: false

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Resolve release metadata and source ref via Zig script
        id: meta
        env:
          FILEUNI_WORKSPACE_PAT: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
        shell: bash
        working-directory: workspace/script-zig
        run: |
          set -euo pipefail
          zig build run -- ci:resolve-community-build \
            --release-tag "${{ inputs.release_tag }}" \
            --workspace-ref "${{ inputs.workspace_ref }}" \
            --build-mode "${{ inputs.build_mode }}" \
            --prerelease "${{ inputs.prerelease }}" \
            --trigger-source "${{ inputs.trigger_source }}" \
            --workspace-repo "${WORKSPACE_REPO}" \
            --workspace-token-env "FILEUNI_WORKSPACE_PAT" \
            --fallback-ref "${{ vars.WORKSPACE_DEFAULT_REF }}" \
            --default-fallback-ref "${DEFAULT_WORKSPACE_REF}"

  build-frontend:
    needs: resolve-meta
    runs-on: ubuntu-latest
    steps:
      - name: Checkout resolved workspace source ref
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.resolve-meta.outputs.resolved_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          fetch-depth: 0
          submodules: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build shared frontends once
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail
          bun install --cwd frontends/cli
          bun run --cwd frontends/cli build
          bun install --cwd frontends/gui
          bun run --cwd frontends/gui build
          test -d frontends/cli/dist
          test -d frontends/gui/dist

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ needs.resolve-meta.outputs.release_tag }}
          path: |
            workspace/frontends/cli/dist
            workspace/frontends/gui/dist

  build:
    needs: [resolve-meta, build-frontend]
    strategy:
      fail-fast: true
      max-parallel: 2
      matrix:
        include:
          - job_name: linux
            runs_on: ubuntu-latest
            cargo_tools_root: /home/runner/.cargo-tools
            target_include_glob: ""
            target_exclude_glob: "*-apple-darwin"
            skip_system_deps: "false"
            skip_fpm: "false"
            appimage_extract_and_run: "1"
          - job_name: macos
            runs_on: macos-14
            cargo_tools_root: /Users/runner/.cargo-tools
            target_include_glob: "*-apple-darwin"
            target_exclude_glob: ""
            skip_system_deps: "true"
            skip_fpm: "true"
            appimage_extract_and_run: "0"
    runs-on: ${{ matrix.runs_on }}
    env:
      FILEUNI_TARGET_INCLUDE_GLOB: ${{ matrix.target_include_glob }}
      FILEUNI_TARGET_EXCLUDE_GLOB: ${{ matrix.target_exclude_glob }}
      FILEUNI_ENABLE_DARWIN_CROSS: "1"
      FILEUNI_SKIP_FRONTEND_BUILD: "1"
      FILEUNI_ENABLE_SCCACHE: "1"
      CARGO_TOOLS_ROOT: ${{ matrix.cargo_tools_root }}
    steps:
      - name: Checkout resolved workspace source ref
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.resolve-meta.outputs.resolved_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          fetch-depth: 0
          submodules: true

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Cache cargo installed tools
        uses: actions/cache@v4
        with:
          path: ${{ matrix.cargo_tools_root }}
          key: ${{ runner.os }}-cargo-tools-v2-tauri2_10
          restore-keys: |
            ${{ runner.os }}-cargo-tools-v2-
            ${{ runner.os }}-cargo-tools-

      - name: Cache cargo-binstall metadata
        uses: actions/cache@v4
        with:
          path: ~/.cache/cargo-binstall
          key: ${{ runner.os }}-cargo-binstall-v1
          restore-keys: |
            ${{ runner.os }}-cargo-binstall-

      - name: Cache Zig build artifacts
        uses: actions/cache@v4
        with:
          path: |
            workspace/.zig-cache
            workspace/script-zig/.zig-cache
            workspace/script-zig/zig-out
          key: ${{ runner.os }}-zig-script-cache-v2-${{ hashFiles('workspace/script-zig/build.zig', 'workspace/script-zig/build_matrix.jsonc', 'workspace/script-zig/src/**/*.zig') }}
          restore-keys: |
            ${{ runner.os }}-zig-script-cache-v2-
            ${{ runner.os }}-zig-script-cache-

      - name: Cache sccache data
        uses: actions/cache@v4
        with:
          path: |
            workspace/target/.cache/sccache
            ~/.cache/sccache
          key: ${{ runner.os }}-sccache-v2-${{ hashFiles('workspace/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-sccache-v2-
            ${{ runner.os }}-sccache-

      - name: Add cargo tools to PATH
        shell: bash
        run: |
          set -euo pipefail
          echo "${CARGO_TOOLS_ROOT}/bin" >> "$GITHUB_PATH"

      - name: Cache Cargo registry and git index
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('workspace/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Rust target directory
        uses: actions/cache@v4
        with:
          path: workspace/target
          key: ${{ runner.os }}-cargo-target-${{ matrix.job_name }}-${{ needs.resolve-meta.outputs.resolved_mode }}-${{ hashFiles('workspace/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-${{ matrix.job_name }}-${{ needs.resolve-meta.outputs.resolved_mode }}-
            ${{ runner.os }}-cargo-target-${{ matrix.job_name }}-
            ${{ runner.os }}-cargo-target-

      - name: Download prebuilt frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-${{ needs.resolve-meta.outputs.release_tag }}
          path: workspace

      - name: Normalize and verify frontend dist layout
        shell: bash
        working-directory: workspace
        run: |
          set -euo pipefail

          ensure_dist() {
            expected="$1"
            shift
            if [ -f "${expected}/index.html" ]; then
              return 0
            fi
            for candidate in "$@"; do
              if [ -f "${candidate}/index.html" ]; then
                echo "recover dist: ${candidate} -> ${expected}"
                rm -rf "${expected}"
                mkdir -p "$(dirname "${expected}")"
                cp -a "${candidate}" "${expected}"
                return 0
              fi
            done
            echo "::error title=Frontend dist missing::Expected ${expected}/index.html not found"
            return 1
          }

          ensure_dist "frontends/cli/dist" \
            "frontends/cli/dist" \
            "workspace/frontends/cli/dist" \
            "cli/dist"
          ensure_dist "frontends/gui/dist" \
            "frontends/gui/dist" \
            "workspace/frontends/gui/dist" \
            "gui/dist"

          echo "frontend dist verified"
          ls -lah frontends/cli/dist | sed -n '1,20p'
          ls -lah frontends/gui/dist | sed -n '1,20p'

      - name: Detect prepare necessity
        id: prepare_check
        shell: bash
        run: |
          set -euo pipefail
          need_prepare=0
          root_bin="${CARGO_TOOLS_ROOT}/bin"
          for tool in cargo-binstall cargo-zigbuild cargo-tauri sccache; do
            if [ ! -x "${root_bin}/${tool}" ]; then
              need_prepare=1
            fi
          done

          skip_system_deps="${{ matrix.skip_system_deps }}"
          skip_fpm="${{ matrix.skip_fpm }}"

          if [ "${{ matrix.job_name }}" = "linux" ]; then
            if command -v pkg-config >/dev/null 2>&1; then
              if pkg-config --exists gtk+-3.0 webkit2gtk-4.1; then
                skip_system_deps="true"
              fi
            fi
            if command -v fpm >/dev/null 2>&1; then
              skip_fpm="true"
            fi
          fi

          if [ "$need_prepare" -eq 0 ] && [ "$skip_system_deps" = "true" ] && [ "$skip_fpm" = "true" ]; then
            echo "need_prepare=false" >> "$GITHUB_OUTPUT"
          else
            echo "need_prepare=true" >> "$GITHUB_OUTPUT"
          fi
          echo "skip_system_deps=${skip_system_deps}" >> "$GITHUB_OUTPUT"
          echo "skip_fpm=${skip_fpm}" >> "$GITHUB_OUTPUT"

      - name: Prepare build dependencies and cross tools via Zig script
        if: steps.prepare_check.outputs.need_prepare == 'true'
        shell: bash
        working-directory: workspace/script-zig
        run: |
          set -euo pipefail
          zig build run -- ci:prepare-tools \
            --cargo-tools-root "${CARGO_TOOLS_ROOT}" \
            --tauri-version "~2.10" \
            --skip-system-deps="${{ steps.prepare_check.outputs.skip_system_deps }}" \
            --skip-fpm="${{ steps.prepare_check.outputs.skip_fpm }}"

      - name: Build release artifacts (${{ matrix.job_name }})
        shell: bash
        working-directory: workspace/script-zig
        env:
          APPIMAGE_EXTRACT_AND_RUN: ${{ matrix.appimage_extract_and_run }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          rm -rf "$OUTPUT_DIR"
          mkdir -p "$OUTPUT_DIR"
          sccache --show-stats || true
          build_log="$(mktemp)"
          assert_log="$(mktemp)"
          trap 'rm -f "$build_log" "$assert_log"' EXIT

          annotate_errors() {
            awk '
              {
                print
                clean=$0
                gsub(/\x1B\[[0-9;]*[[:alpha:]]/, "", clean)
                if (clean ~ /\[ERROR\]|build-all failures|target failed|command failed \(|Package .* failed|failed for|error:|fatal error:/) {
                  print "::error::" clean
                }
              }
            '
          }

          collect_failure_digest() {
            awk '
              {
                clean=$0
                gsub(/\x1B\[[0-9;]*[[:alpha:]]/, "", clean)
                if (clean ~ /\[ERROR\]|fatal error:|error: could not compile|failed to run custom build command|unsupported target|failed to find tool|unable to find dynamic system library|russh requires enabling either ring or aws-lc-rs|command failed \(|Package .* failed/) {
                  if (!(clean in seen)) {
                    seen[clean] = 1
                    print clean
                    count++
                    if (count >= 120) exit
                  }
                }
              }
            ' "$@"
          }

          set +e
          zig build run -- release:build-all "${{ needs.resolve-meta.outputs.resolved_mode }}" --output-dir "$OUTPUT_DIR" 2>&1 | tee "$build_log" | annotate_errors
          build_exit=${PIPESTATUS[0]}
          if [ "$build_exit" -eq 0 ]; then
            zig build run -- ci:assert-artifacts --output-dir "$OUTPUT_DIR" 2>&1 | tee "$assert_log" | annotate_errors
            assert_exit=${PIPESTATUS[0]}
          else
            echo "skip ci:assert-artifacts because build failed"
            assert_exit=1
          fi
          set -e

          if [ "$build_exit" -ne 0 ] || [ "$assert_exit" -ne 0 ]; then
            echo "::error title=Build failed (${{ matrix.job_name }})::release:build-all or ci:assert-artifacts failed"
            failure_digest="$(collect_failure_digest "$build_log" "$assert_log" | sed '/^[[:space:]]*$/d' || true)"
            if [ -z "${failure_digest:-}" ]; then
              failure_digest="No digest lines matched. Check full logs in this step."
            fi
            echo "::group::Failure digest"
            printf '%s\n' "$failure_digest"
            echo "::endgroup::"
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              echo "::error::$line"
            done <<< "$failure_digest"
            sccache --show-stats || true
            if [ -n "${GITHUB_TOKEN:-}" ]; then
              curl -fsS -X POST \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/cancel" >/dev/null || true
            fi
            exit 1
          fi
          sccache --show-stats || true

      - name: Upload workflow artifacts (${{ matrix.job_name }})
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.job_name }}-${{ needs.resolve-meta.outputs.release_tag }}
          path: |
            /tmp/FileUniRelease/*

  publish:
    needs: [resolve-meta, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout resolved workspace source ref
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.resolve-meta.outputs.resolved_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          fetch-depth: 0
          submodules: false

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*-${{ needs.resolve-meta.outputs.release_tag }}
          path: /tmp/FileUniRelease
          merge-multiple: true

      - name: List merged artifacts
        shell: bash
        run: |
          set -euo pipefail
          ls -lah /tmp/FileUniRelease || true

      - name: Publish GitHub Release in community repo via Zig script
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        working-directory: workspace/script-zig
        run: |
          set -euo pipefail
          zig build run -- ci:publish-community-release \
            --repo "${GITHUB_REPOSITORY}" \
            --release-tag "${{ needs.resolve-meta.outputs.release_tag }}" \
            --workspace-ref "${{ needs.resolve-meta.outputs.resolved_ref }}" \
            --build-mode "${{ needs.resolve-meta.outputs.resolved_mode }}" \
            --trigger-source "${{ needs.resolve-meta.outputs.trigger_source }}" \
            --prerelease "${{ needs.resolve-meta.outputs.resolved_prerelease }}" \
            --output-dir "${OUTPUT_DIR}" \
            --token-env "GITHUB_TOKEN"

      - name: Add workflow summary via Zig script
        if: always()
        shell: bash
        working-directory: workspace/script-zig
        run: |
          set -euo pipefail
          zig build run -- ci:write-release-summary \
            --release-tag "${{ needs.resolve-meta.outputs.release_tag }}" \
            --workspace-ref "${{ needs.resolve-meta.outputs.resolved_ref }}" \
            --build-mode "${{ needs.resolve-meta.outputs.resolved_mode }}" \
            --prerelease "${{ needs.resolve-meta.outputs.resolved_prerelease }}" \
            --trigger-source "${{ needs.resolve-meta.outputs.trigger_source }}"
