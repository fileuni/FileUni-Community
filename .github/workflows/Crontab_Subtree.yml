name: Crontab Subtree Sync

on:
  workflow_dispatch:
    inputs:
      workspace_ref:
        description: "Source ref in FileUni-WorkSpace (branch/tag/sha). Default: main"
        required: false
        default: "main"
      force_push:
        description: "Force push subtrees when workspace history was rewritten (e.g., git push -f)"
        required: false
        default: "false"
        type: boolean
  schedule:
    - cron: "35 */1 * * *"

permissions:
  contents: read

concurrency:
  group: crontab-subtree-sync
  cancel-in-progress: false

env:
  WORKSPACE_REPO: FileUni/FileUni-WorkSpace
  WORKSPACE_DEFAULT_REF: main

jobs:
  subtree-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve workspace ref
        id: resolve-ref
        shell: bash
        run: |
          set -euo pipefail

          ref="${{ github.event.inputs.workspace_ref }}"
          echo "ref=${ref:-${WORKSPACE_DEFAULT_REF}}" >> "$GITHUB_OUTPUT"

      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ steps.resolve-ref.outputs.ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          fetch-depth: 0
          submodules: true
          fetch-tags: true

      - name: Configure git identity
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Push FileUni subtrees
        working-directory: workspace
        env:
          FILEUNI_WORKSPACE_PAT: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          FORCE_PUSH: ${{ github.event.inputs.force_push }}
        shell: bash
        run: |
          set -euo pipefail

          workspace_token="${FILEUNI_WORKSPACE_PAT:-}"
          force_push="${FORCE_PUSH:-false}"
          if [ -z "${workspace_token}" ]; then
            echo "::error::missing FILEUNI_WORKSPACE_PAT"
            exit 1
          fi

          push_subtree() {
            local prefix="$1"
            local repo="$2"
            local remote_url="https://x-access-token:${workspace_token}@github.com/${repo}.git"

            echo "::group::subtree push ${prefix} -> ${repo}"

            if [ "${force_push}" = "true" ]; then
              echo "::warning::force_push enabled; rewriting ${repo}:main to match workspace"

              split_sha="$(git subtree split --prefix="${prefix}" --ignore-joins)"
              remote_main_sha="$(git ls-remote "${remote_url}" refs/heads/main | cut -f1)"

              if [ -z "${remote_main_sha}" ]; then
                git push "${remote_url}" "${split_sha}:refs/heads/main"
              else
                git push "${remote_url}" "${split_sha}:refs/heads/main" \
                  --force-with-lease=refs/heads/main:"${remote_main_sha}"
              fi
            else
              git subtree push \
                --prefix="${prefix}" \
                "${remote_url}" \
                main
            fi
            echo "::endgroup::"
          }

          push_subtree "FileUni-Project" "FileUni/FileUni-Project"
          push_subtree "OfficialSiteDocs" "FileUni/OfficialSiteDocs"
          push_subtree "frontends" "FileUni/frontends"
          push_subtree "OfficialSitePrivate" "FileUni/OfficialSitePrivate"
          push_subtree "crates/yh-filemanager-vfs-storage-hub" "FileUni/yh-filemanager-vfs-storage-hub"
