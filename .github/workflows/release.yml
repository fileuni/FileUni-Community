name: Release

on:
  workflow_dispatch:
    inputs:
      workspace_ref:
        description: "Source ref in FileUni-WorkSpace (tag/branch/sha). Default: main"
        required: false
        default: "main"
      prerelease:
        description: "Mark as pre-release"
        type: boolean
        required: false
        default: true
      enable_upx:
        description: "Create UPX-compressed copies of binaries"
        type: boolean
        required: false
        default: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.run_id }}
  cancel-in-progress: false

env:
  WORKSPACE_REPO: FileUni/FileUni-WorkSpace
  CARGO_DIST_VERSION: "0.28.0"

jobs:
  build-frontends:
    runs-on: ubuntu-latest
    outputs:
      workspace_ref: ${{ steps.meta.outputs.workspace_ref }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      dist_tag: ${{ steps.meta.outputs.dist_tag }}
      pkg_version: ${{ steps.meta.outputs.pkg_version }}
    steps:
      - name: Resolve workspace ref
        id: resolve-ref
        run: |
          ref="${{ github.event.inputs.workspace_ref }}"
          echo "ref=${ref:-main}" >> "$GITHUB_OUTPUT"

      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ steps.resolve-ref.outputs.ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          submodules: true
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve release metadata
        id: meta
        working-directory: workspace
        run: |
          ref="${{ steps.resolve-ref.outputs.ref }}"
          echo "workspace_ref=${ref}" >> "$GITHUB_OUTPUT"

          pkg_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "fileuni") | .version')"
          echo "dist_tag=v${pkg_version}" >> "$GITHUB_OUTPUT"
          echo "pkg_version=${pkg_version}" >> "$GITHUB_OUTPUT"

          if echo "${ref}" | grep -qE '^v[0-9]+\.[0-9]+'; then
            release_tag="${ref}"
          else
            release_tag="Release_$(date -u '+%Y%m%d_%H%M%S')"
          fi
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "::notice::dist_tag=v${pkg_version}  release_tag=${release_tag}  ref=${ref}"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            workspace/frontends/node_modules
            workspace/frontends/cli/node_modules
            workspace/frontends/shared/node_modules
          key: bun-${{ hashFiles('workspace/frontends/bun.lock') }}
          restore-keys: bun-

      - name: Build frontends
        working-directory: workspace/frontends
        run: |
          bun install
          bun run --cwd cli build
          test -f cli/dist/index.html

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: workspace/frontends/cli/dist

  # ============================================================
  # Tier 1/2: cargo-dist native builds
  # ============================================================
  build-cli:
    needs: build-frontends
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Linux ---
          - { runner: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { runner: ubuntu-latest,  target: x86_64-unknown-linux-musl }
          - { runner: ubuntu-latest,  target: aarch64-unknown-linux-gnu }
          # --- Windows ---
          - { runner: windows-latest, target: x86_64-pc-windows-msvc }
          - { runner: windows-latest, target: i686-pc-windows-msvc }
          # --- macOS ---
          - { runner: macos-15,       target: x86_64-apple-darwin }
          - { runner: macos-15,       target: aarch64-apple-darwin }
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.build-frontends.outputs.workspace_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          submodules: true
          fetch-depth: 0
          fetch-tags: true

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: workspace/frontends/cli/dist

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-dist
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-dist@${{ env.CARGO_DIST_VERSION }}

      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Setup Zig (for cross-compilation)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: mlugg/setup-zig@v2
        with:
          version: "0.13.0"

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: workspace
          key: ${{ matrix.target }}

      - name: Build via cargo-dist
        working-directory: workspace
        run: dist build --tag="${{ needs.build-frontends.outputs.dist_tag }}" --target "${{ matrix.target }}" --artifacts=local

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: workspace/target/distrib/*

  # ============================================================
  # Cross-compiled builds (Linux exotic + Android)
  # ============================================================
  build-cli-cross:
    needs: build-frontends
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Linux ARM ---
          - { target: aarch64-unknown-linux-musl,    nfpm_arch: arm64,   upx: true  }
          - { target: armv7-unknown-linux-musleabihf, nfpm_arch: armhf,   upx: true  }
          - { target: arm-unknown-linux-gnueabi,     nfpm_arch: armel,   upx: false }
          # --- Linux RISC-V ---
          - { target: riscv64gc-unknown-linux-gnu,   nfpm_arch: riscv64, upx: false }
          # --- Linux PowerPC ---
          - { target: powerpc64le-unknown-linux-gnu, nfpm_arch: ppc64le, upx: false }
          # --- Android ---
          - { target: aarch64-linux-android,         nfpm_arch: "",      upx: false }
          - { target: armv7-linux-androideabi,       nfpm_arch: "",      upx: false }
          - { target: x86_64-linux-android,          nfpm_arch: "",      upx: false }
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.build-frontends.outputs.workspace_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          submodules: true

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: workspace/frontends/cli/dist

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: workspace
          key: cross-${{ matrix.target }}

      - name: Build via cross
        working-directory: workspace
        run: cross build --release --package fileuni --target "${{ matrix.target }}"

      - name: Package binary
        run: |
          target="${{ matrix.target }}"
          bin="workspace/target/${target}/release/fileuni"
          if [ ! -f "${bin}" ]; then
            bin="workspace/target/${target}/release/fileuni.exe"
          fi
          mkdir -p dist
          if echo "${target}" | grep -q "windows"; then
            zip "dist/fileuni-${target}.zip" "${bin}"
          else
            tar -cJf "dist/fileuni-${target}.tar.xz" -C "$(dirname "${bin}")" "$(basename "${bin}")"
          fi

      - name: Create UPX-compressed copy
        if: matrix.upx && github.event.inputs.enable_upx != 'false'
        run: |
          target="${{ matrix.target }}"
          bin="workspace/target/${target}/release/fileuni"
          if [ ! -f "${bin}" ]; then
            echo "::warning::Binary not found for UPX, skipping"
            exit 0
          fi

          sudo apt-get update -qq && sudo apt-get install -y -qq upx-ucl > /dev/null 2>&1

          cp "${bin}" "${bin}-upx"
          upx --best --lzma "${bin}-upx" || { echo "::warning::UPX compression failed for ${target}"; rm -f "${bin}-upx"; exit 0; }

          mkdir -p dist-upx
          tar -cJf "dist-upx/fileuni-${target}-upx.tar.xz" -C "$(dirname "${bin}")" "fileuni-upx"

      - name: Upload UPX artifacts
        if: matrix.upx && github.event.inputs.enable_upx != 'false'
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}-upx
          path: dist-upx/*
          if-no-files-found: ignore

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: dist/*

  # ============================================================
  # BSD builds via vmactions (FreeBSD native VM)
  # ============================================================
  build-cli-bsd:
    needs: build-frontends
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: freebsd, release: "14.2", target: x86_64-unknown-freebsd }
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.build-frontends.outputs.workspace_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          submodules: true

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: workspace/frontends/cli/dist

      - name: Build on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          release: ${{ matrix.release }}
          usesh: true
          copyback: true
          mem: 8192
          prepare: |
            pkg install -y rust curl
          run: |
            cd workspace
            cargo build --release --package fileuni
            ls -la target/release/fileuni

      - name: Package binary
        run: |
          target="${{ matrix.target }}"
          bin="workspace/target/release/fileuni"
          if [ ! -f "${bin}" ]; then
            echo "::error::Binary not found at ${bin}"
            exit 1
          fi
          mkdir -p dist
          tar -cJf "dist/fileuni-${target}.tar.xz" -C "$(dirname "${bin}")" "$(basename "${bin}")"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: dist/*

  # ============================================================
  # Linux packaging via nFPM (deb/rpm/apk/archlinux/ipk)
  # Runs after all Linux builds complete, packages each arch.
  # ============================================================
  package-linux:
    needs: [build-frontends, build-cli, build-cli-cross]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- from build-cli ---
          - { target: x86_64-unknown-linux-gnu,      nfpm_arch: amd64,   artifact: cli-x86_64-unknown-linux-gnu }
          - { target: x86_64-unknown-linux-musl,     nfpm_arch: amd64,   artifact: cli-x86_64-unknown-linux-musl }
          - { target: aarch64-unknown-linux-gnu,     nfpm_arch: arm64,   artifact: cli-aarch64-unknown-linux-gnu }
          # --- from build-cli-cross ---
          - { target: aarch64-unknown-linux-musl,    nfpm_arch: arm64,   artifact: cli-aarch64-unknown-linux-musl }
          - { target: armv7-unknown-linux-musleabihf, nfpm_arch: armhf,   artifact: cli-armv7-unknown-linux-musleabihf }
          - { target: arm-unknown-linux-gnueabi,     nfpm_arch: armel,   artifact: cli-arm-unknown-linux-gnueabi }
          - { target: riscv64gc-unknown-linux-gnu,   nfpm_arch: riscv64, artifact: cli-riscv64gc-unknown-linux-gnu }
          - { target: powerpc64le-unknown-linux-gnu, nfpm_arch: ppc64le, artifact: cli-powerpc64le-unknown-linux-gnu }
    steps:
      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifact

      - name: Extract binary
        run: |
          mkdir -p binary
          file="$(ls artifact/fileuni-*.tar.xz 2>/dev/null | head -1)"
          if [ -n "${file}" ]; then
            tar -xJf "${file}" -C binary
          else
            cp artifact/fileuni binary/ 2>/dev/null || true
          fi
          chmod +x binary/fileuni || true
          ls -la binary/

      - name: Install nFPM
        uses: secondlife/setup-nfpm@v1

      - name: Create nfpm config
        run: |
          cat > nfpm.yaml <<'NFPM'
          name: fileuni
          arch: ${NFPM_ARCH}
          version: ${VERSION}
          maintainer: FileUni Team <contact@fileuni.com>
          description: FileUni - Modular file platform
          homepage: https://github.com/FileUni
          license: MIT
          contents:
            - src: ./binary/fileuni
              dst: /usr/bin/fileuni
              file_info:
                mode: 0755
          NFPM

      - name: Build packages
        env:
          NFPM_ARCH: ${{ matrix.nfpm_arch }}
          VERSION: ${{ needs.build-frontends.outputs.pkg_version }}
        run: |
          mkdir -p packages
          target="${{ matrix.target }}"

          for fmt in deb rpm apk archlinux ipk; do
            nfpm package --packager "${fmt}" --config nfpm.yaml --target "packages/" 2>&1 || echo "::warning::${fmt} packaging failed for ${target}"
          done

          ls -la packages/

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.target }}
          path: packages/*

  publish:
    needs: [build-frontends, build-cli, build-cli-cross, build-cli-bsd, package-linux]
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "{cli-*,packages-*}"
          path: /tmp/release
          merge-multiple: true

      - name: List release files
        run: |
          echo "=== Release artifacts ==="
          find /tmp/release -type f | sort
          count="$(find /tmp/release -type f | wc -l)"
          echo "Total: ${count} files"
          if [ "${count}" -eq 0 ]; then
            echo "::error::No release artifacts found"
            exit 1
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-frontends.outputs.release_tag }}
          name: ${{ needs.build-frontends.outputs.release_tag }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          fail_on_unmatched_files: false
          files: /tmp/release/*
          body: |
            ## FileUni ${{ needs.build-frontends.outputs.release_tag }}

            Built from [`${{ needs.build-frontends.outputs.workspace_ref }}`](https://github.com/${{ env.WORKSPACE_REPO }}/tree/${{ needs.build-frontends.outputs.workspace_ref }})
