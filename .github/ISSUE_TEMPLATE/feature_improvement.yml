name: "✨ Feature Improvement"
description: Suggest improvements to existing features
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for your suggestion! This form is for **improvements to existing features only**. For new feature ideas, please use [Discussions](https://github.com/FileUni/FileUni-Project/discussions).
        
        Please describe in English (imperfect grammar or machine translation is fine). See our [Language Policy](https://github.com/FileUni/FileUni-Project/blob/main/CONTRIBUTING.md#language-policy) and [Why English](https://github.com/FileUni/FileUni-Project/blob/main/CONTRIBUTING.md#why-english).

  - type: checkboxes
    id: pre-check
    attributes:
      label: Before submitting
      options:
        - label: This is an improvement to an EXISTING feature
          required: true
        - label: I have searched existing issues and discussions
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      options:
        - File Management
        - User Interface
        - Authentication & Users
        - Performance
        - API
        - Other
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: Current Behavior
    validations:
      required: true

  - type: textarea
    id: improvement
    attributes:
      label: Proposed Improvement
    validations:
      required: true

  - type: textarea
    id: benefit
    attributes:
      label: Benefits (optional)
