name: "🐛 Bug Report"
description: Report a bug to help us improve FileUni
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please describe the issue in English (imperfect grammar or machine translation is fine). See our [Language Policy](https://github.com/FileUni/FileUni-Project/blob/main/CONTRIBUTING.md#language-policy) and [Why English](https://github.com/FileUni/FileUni-Project/blob/main/CONTRIBUTING.md#why-english).

  - type: checkboxes
    id: pre-check
    attributes:
      label: Before submitting
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - FileUni Version:
        - OS:
        - Browser/Deployment:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs (optional)
      render: shell
